<!DOCTYPE html>
<!--
  ============================================================
   CRYPTO-TERMINAL - in de stijl van CCTrader
  ============================================================

  Drie nieuwe dingen, allemaal gemarkeerd met "NIEUW":

  A) CANDLESTICK-GRAFIEK (de blokjes/kaarsen i.p.v. een lijn).
     Hiervoor gebruiken we Lightweight Charts van TradingView -
     dezelfde soort grafiek die echte trading-terminals gebruiken.

  B) INDICATOR: een voortschrijdend gemiddelde (MA) dat je met
     een knopje aan/uit zet. We rekenen het zelf uit, zodat je
     ziet dat een 'indicator' gewoon een berekening op de prijs is.

  C) PAPER TRADING: een Buy/Sell-paneel met NEPGELD ($10.000 om
     mee te starten). Je koopt en verkoopt tegen de echte koers,
     maar er gaat geen cent echt geld in om. Je nep-trades vullen
     meteen je Portfolio. 100% veilig om mee te oefenen.

  Openen: dubbelklikken. Internet nodig.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn crypto-terminal</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <!-- NIEUW (A): de candlestick-grafiek-library (versie 4.1.1). -->
  <script src="https://cdn.jsdelivr.net/npm/lightweight-charts@4.1.1/dist/lightweight-charts.standalone.production.js"></script>

  <style>
    :root {
      --achtergrond: #0E1525; --kaart: #18213A; --rand: #263250;
      --tekst: #E8ECF5; --tekst-zacht: #8A93A8;
      --omhoog: #16C784; --omlaag: #EA3943; --accent: #3B82F6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background-color: var(--achtergrond); color: var(--tekst);
      font-family: 'Inter', sans-serif; min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center; padding: 40px 20px;
    }
    .kaart {
      background-color: var(--kaart); border: 1px solid var(--rand);
      border-radius: 20px; width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4); overflow: hidden;
    }
    .inhoud { padding: 24px; }

    .kop { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .titel { font-size: 20px; font-weight: 700; }
    .live { display: flex; align-items: center; gap: 7px; font-size: 12px; font-weight: 600; letter-spacing: 0.5px; color: var(--omhoog); }
    .stip { width: 8px; height: 8px; border-radius: 50%; background-color: var(--omhoog); animation: kloppen 1.6s ease-in-out infinite; }
    .subtitel { font-size: 13px; color: var(--tekst-zacht); }

    .valuta-rij { display: flex; align-items: center; justify-content: space-between; margin: 6px 0 20px; }
    .valuta-keuze {
      background-color: var(--achtergrond); color: var(--tekst); border: 1px solid var(--rand);
      border-radius: 8px; padding: 6px 10px; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer;
    }

    .rij { display: flex; align-items: center; gap: 14px; padding: 14px 6px; border-top: 1px solid var(--rand); cursor: pointer; border-radius: 10px; transition: background-color 0.15s ease; }
    .rij:hover { background-color: rgba(255,255,255,0.04); }
    .rij:first-of-type { border-top: none; }
    .logo { width: 38px; height: 38px; border-radius: 50%; color: #fff; font-weight: 700; font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .naam-blok { flex: 1; min-width: 0; }
    .naam { font-weight: 600; font-size: 15px; }
    .ticker { color: var(--tekst-zacht); font-size: 12px; }
    .prijs-blok { text-align: right; }
    .prijs { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px; transition: color 0.6s ease; }
    .verandering { font-family: 'Space Mono', monospace; font-size: 13px; margin-top: 2px; }
    .positief { color: var(--omhoog); }
    .negatief { color: var(--omlaag); }

    .voet { margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--rand); font-size: 12px; color: var(--tekst-zacht); display: flex; justify-content: space-between; }

    #detail { display: none; }
    .terug { background: none; border: none; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; padding: 4px 0; margin-bottom: 14px; }
    .terug:hover { color: var(--tekst); }
    .detail-kop { display: flex; align-items: center; gap: 14px; margin-bottom: 12px; }
    .detail-prijs { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 26px; margin-bottom: 2px; }
    .detail-ver { font-family: 'Space Mono', monospace; font-size: 13px; }

    /* NIEUW (A): de container waar de candlestick-grafiek in komt */
    .grafiek-vak { height: 240px; margin: 14px 0 10px; }

    .knoppenrij { display: flex; gap: 6px; margin-bottom: 6px; overflow-x: auto; padding-bottom: 4px; }
    .tijdknop { flex: 0 0 auto; padding: 7px 12px; background-color: var(--achtergrond); border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.15s ease; }
    .tijdknop:hover { color: var(--tekst); }
    .tijdknop.actief { background-color: var(--rand); color: var(--tekst); border-color: var(--tekst-zacht); }

    /* NIEUW (B): het MA-knopje */
    .ind-knop { flex: 0 0 auto; padding: 7px 12px; background-color: var(--achtergrond); border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .ind-knop.actief { background-color: rgba(247,147,26,0.15); color: #F7931A; border-color: #F7931A; }

    /* NIEUW (C): het order-paneel */
    .orderpaneel { background-color: var(--achtergrond); border: 1px solid var(--rand); border-radius: 12px; padding: 14px; margin-top: 14px; }
    .order-saldo { display: flex; justify-content: space-between; font-size: 12px; color: var(--tekst-zacht); margin-bottom: 12px; }
    .order-saldo b { color: var(--tekst); font-family: 'Space Mono', monospace; }
    .order-tabs { display: flex; gap: 6px; margin-bottom: 10px; }
    .order-tab { flex: 1; padding: 8px 0; background-color: var(--kaart); border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .order-tab.actief-koop { background-color: rgba(22,199,132,0.15); color: var(--omhoog); border-color: var(--omhoog); }
    .order-tab.actief-verkoop { background-color: rgba(234,57,67,0.15); color: var(--omlaag); border-color: var(--omlaag); }
    .order-veld { display: flex; gap: 6px; }
    .order-veld input { flex: 1; padding: 9px 10px; background-color: var(--kaart); border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst); font-family: 'Inter', sans-serif; font-size: 14px; }
    .alles-knop { padding: 0 12px; background-color: var(--kaart); border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; cursor: pointer; }
    .doe-knop { width: 100%; padding: 11px; border: none; border-radius: 8px; color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .doe-knop.koop { background-color: var(--omhoog); }
    .doe-knop.verkoop { background-color: var(--omlaag); }
    .doe-knop:hover { filter: brightness(1.1); }
    .order-melding { font-size: 12px; margin-top: 8px; min-height: 16px; text-align: center; }

    #portfolioscherm { display: none; }
    .sim-badge { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: 0.5px; color: #F7931A; background: rgba(247,147,26,0.15); border: 1px solid #F7931A; border-radius: 6px; padding: 2px 7px; margin-left: 8px; vertical-align: middle; }
    .balans-vak { margin-bottom: 16px; }
    .balans-label { font-size: 13px; color: var(--tekst-zacht); }
    .balans-bedrag { font-family: 'Space Mono', monospace; font-size: 32px; font-weight: 700; margin: 4px 0; }
    .balans-pnl { font-family: 'Space Mono', monospace; font-size: 14px; }
    .saldo-regel { display: flex; justify-content: space-between; font-size: 13px; color: var(--tekst-zacht); padding: 4px 0; }
    .saldo-regel b { color: var(--tekst); font-family: 'Space Mono', monospace; font-weight: 700; }
    .leeg { text-align: center; color: var(--tekst-zacht); padding: 20px 0; font-size: 14px; }
    .positie { display: flex; align-items: center; gap: 12px; padding: 12px 0; border-top: 1px solid var(--rand); }
    .positie-info { flex: 1; min-width: 0; }
    .positie-naam { font-weight: 600; font-size: 14px; }
    .positie-detail { font-size: 12px; color: var(--tekst-zacht); margin-top: 1px; }
    .positie-waarde { text-align: right; }
    .positie-bedrag { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
    .positie-pnl { font-family: 'Space Mono', monospace; font-size: 12px; margin-top: 1px; }
    .reset-knop { width: 100%; margin-top: 18px; padding: 9px; background: none; border: 1px solid var(--rand); border-radius: 8px; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; cursor: pointer; }
    .reset-knop:hover { color: var(--omlaag); border-color: var(--omlaag); }

    .menubalk { display: flex; border-top: 1px solid var(--rand); background-color: rgba(0,0,0,0.15); }
    .menuknop { flex: 1; padding: 14px 0; background: none; border: none; cursor: pointer; color: var(--tekst-zacht); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; }
    .menuknop.actief { color: var(--tekst); }

    @keyframes kloppen { 0%,100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.4; transform: scale(0.8); } }
    @media (prefers-reduced-motion: reduce) { .stip { animation: none; } }
  </style>
</head>

<body>
  <div class="kaart">
    <div class="inhoud">

      <!-- ===== SCHERM 1: MARKTEN ===== -->
      <div id="lijstscherm">
        <div class="kop">
          <div class="titel">Markten</div>
          <div class="live"><span class="stip"></span>LIVE</div>
        </div>
        <div class="valuta-rij">
          <div class="subtitel">Tik op een munt voor de terminal</div>
          <select class="valuta-keuze" id="valuta-keuze">
            <option value="USD">USD</option>
            <option value="USDT">USDT</option>
            <option value="USDC">USDC</option>
            <option value="EUR">EUR</option>
          </select>
        </div>
        <div id="lijst"></div>
        <div class="voet">
          <span>Bron: CoinGecko + Binance</span>
          <span id="bijgewerkt">&nbsp;</span>
        </div>
      </div>

      <!-- ===== SCHERM 2: TERMINAL (grafiek + order-paneel) ===== -->
      <div id="detail">
        <button class="terug" id="terugknop">&larr; Terug naar markten</button>
        <div class="detail-kop">
          <div class="logo" id="detail-logo">B</div>
          <div>
            <div class="naam" id="detail-naam">Bitcoin</div>
            <div class="ticker" id="detail-ticker">BTC / USDT</div>
          </div>
        </div>
        <div class="detail-prijs" id="detail-prijs">...</div>
        <div class="detail-ver" id="detail-ver">&nbsp;</div>

        <!-- NIEUW (A): hierin tekent Lightweight Charts de kaarsen -->
        <div class="grafiek-vak" id="grafiek"></div>

        <div class="knoppenrij">
          <button class="tijdknop actief" data-interval="1m"  data-limit="150">1m</button>
          <button class="tijdknop"        data-interval="5m"  data-limit="150">5m</button>
          <button class="tijdknop"        data-interval="15m" data-limit="120">15m</button>
          <button class="tijdknop"        data-interval="1h"  data-limit="150">1u</button>
          <button class="tijdknop"        data-interval="4h"  data-limit="150">4u</button>
          <button class="tijdknop"        data-interval="1d"  data-limit="150">1d</button>
          <button class="tijdknop"        data-interval="1w"  data-limit="120">1w</button>
        </div>
        <div class="knoppenrij">
          <!-- NIEUW (B): zet het voortschrijdend gemiddelde aan/uit -->
          <button class="ind-knop" id="ma-knop">MA (7 &amp; 25)</button>
        </div>

        <!-- NIEUW (C): het paper-trading order-paneel -->
        <div class="orderpaneel">
          <div class="order-saldo">
            <span>Beschikbaar: <b id="order-cash">$10,000.00</b></span>
            <span id="order-bezit">0 BTC</span>
          </div>
          <div class="order-tabs">
            <button class="order-tab actief-koop" id="tab-koop">Kopen</button>
            <button class="order-tab" id="tab-verkoop">Verkopen</button>
          </div>
          <div id="koop-vak">
            <div class="order-veld">
              <input id="koop-bedrag" type="text" inputmode="decimal" placeholder="Bedrag (bijv. 500)">
            </div>
            <button class="doe-knop koop" id="koop-knop">Koop <span id="koop-ticker">BTC</span></button>
          </div>
          <div id="verkoop-vak" style="display:none">
            <div class="order-veld">
              <input id="verkoop-aantal" type="text" inputmode="decimal" placeholder="Aantal">
              <button class="alles-knop" id="alles-knop">Alles</button>
            </div>
            <button class="doe-knop verkoop" id="verkoop-knop">Verkoop <span id="verkoop-ticker">BTC</span></button>
          </div>
          <div class="order-melding" id="order-melding"></div>
        </div>
      </div>

      <!-- ===== SCHERM 3: PORTFOLIO (paper-trading account) ===== -->
      <div id="portfolioscherm">
        <div class="kop"><div class="titel">Portfolio <span class="sim-badge">SIMULATIE</span></div></div>
        <div class="balans-vak">
          <div class="balans-label">Totale waarde (contant + bezit)</div>
          <div class="balans-bedrag" id="totaal-waarde">$0.00</div>
          <div class="balans-pnl" id="totaal-pnl">&nbsp;</div>
        </div>
        <div class="saldo-regel"><span>Contant geld</span><b id="contant-saldo">$10,000.00</b></div>
        <div class="saldo-regel"><span>Waarde in munten</span><b id="bezit-saldo">$0.00</b></div>
        <div id="posities"></div>
        <button class="reset-knop" id="reset-knop">Simulatie resetten ($10.000)</button>
      </div>

    </div>

    <div class="menubalk">
      <button class="menuknop actief" id="nav-markten">Markten</button>
      <button class="menuknop" id="nav-portfolio">Portfolio</button>
    </div>
  </div>

  <script>

    const MUNTEN = [
      { id: "bitcoin",      naam: "Bitcoin",   ticker: "BTC",  letter: "B", kleur: "#F7931A" },
      { id: "ethereum",     naam: "Ethereum",  ticker: "ETH",  letter: "E", kleur: "#627EEA" },
      { id: "binancecoin",  naam: "BNB",       ticker: "BNB",  letter: "B", kleur: "#F3BA2F" },
      { id: "solana",       naam: "Solana",    ticker: "SOL",  letter: "S", kleur: "#14B88A" },
      { id: "ripple",       naam: "XRP",       ticker: "XRP",  letter: "X", kleur: "#23A0D8" },
      { id: "cardano",      naam: "Cardano",   ticker: "ADA",  letter: "A", kleur: "#3468D1" },
      { id: "dogecoin",     naam: "Dogecoin",  ticker: "DOGE", letter: "D", kleur: "#C2A633" },
      { id: "avalanche-2",  naam: "Avalanche", ticker: "AVAX", letter: "A", kleur: "#E84142" },
      { id: "chainlink",    naam: "Chainlink", ticker: "LINK", letter: "L", kleur: "#2A5ADA" },
      { id: "polkadot",     naam: "Polkadot",  ticker: "DOT",  letter: "D", kleur: "#E6007A" },
      { id: "litecoin",     naam: "Litecoin",  ticker: "LTC",  letter: "L", kleur: "#345D9D" },
      { id: "tron",         naam: "TRON",      ticker: "TRX",  letter: "T", kleur: "#EF0027" },
    ];
    const muntPerId = {};
    MUNTEN.forEach(function (m) { muntPerId[m.id] = m; });

    const VALUTA = {
      USD:  { cg: "usd", binance: "USDT", symbool: "$" },
      USDT: { cg: "usd", binance: "USDT", symbool: "$" },
      USDC: { cg: "usd", binance: "USDC", symbool: "$" },
      EUR:  { cg: "eur", binance: "EUR",  symbool: "\u20AC" },
    };
    let huidigeValuta = "USD";

    const lijstEl = document.getElementById("lijst");
    const bijgewerktEl = document.getElementById("bijgewerkt");
    const vorigePrijzen = {};
    const laatstePrijzen = {};

    const lijstscherm = document.getElementById("lijstscherm");
    const detail = document.getElementById("detail");
    const portfolioscherm = document.getElementById("portfolioscherm");

    let huidigeMunt = null;
    let huidigInterval = "1m";
    let huidigLimit = 150;

    // ===== MARKTEN-LIJST =====
    function bouwRijen() {
      MUNTEN.forEach(function (munt) {
        const rij = document.createElement("div");
        rij.className = "rij";
        rij.innerHTML =
          '<div class="logo" style="background-color:' + munt.kleur + '">' + munt.letter + '</div>' +
          '<div class="naam-blok">' +
            '<div class="naam">' + munt.naam + '</div>' +
            '<div class="ticker" id="tick-' + munt.id + '">' + munt.ticker + ' / ' + huidigeValuta + '</div>' +
          '</div>' +
          '<div class="prijs-blok">' +
            '<div class="prijs" id="prijs-' + munt.id + '">...</div>' +
            '<div class="verandering" id="ver-' + munt.id + '">&nbsp;</div>' +
          '</div>';
        rij.addEventListener("click", function () { openTerminal(munt); });
        lijstEl.appendChild(rij);
      });
    }
    function updateLabels() {
      MUNTEN.forEach(function (munt) {
        const el = document.getElementById("tick-" + munt.id);
        if (el) el.textContent = munt.ticker + " / " + huidigeValuta;
      });
    }

    async function haalKoersenOp() {
      try {
        const cg = VALUTA[huidigeValuta].cg;
        const ids = MUNTEN.map(function (m) { return m.id; }).join(",");
        const adres = "https://api.coingecko.com/api/v3/simple/price?ids=" + ids + "&vs_currencies=" + cg + "&include_24hr_change=true";
        const gegevens = await (await fetch(adres)).json();

        MUNTEN.forEach(function (munt) {
          const data = gegevens[munt.id];
          if (!data) return;
          const prijs = data[cg];
          laatstePrijzen[munt.id] = prijs;
          const prijsEl = document.getElementById("prijs-" + munt.id);
          const verEl = document.getElementById("ver-" + munt.id);
          prijsEl.textContent = formatPrijs(prijs);
          const vorige = vorigePrijzen[munt.id];
          if (vorige !== undefined) {
            if (prijs > vorige) flits(prijsEl, "var(--omhoog)");
            else if (prijs < vorige) flits(prijsEl, "var(--omlaag)");
          }
          vorigePrijzen[munt.id] = prijs;
          const v = data[cg + "_24h_change"];
          if (v != null) {
            const teken = v >= 0 ? "+" : "";
            verEl.textContent = teken + v.toFixed(2) + "%";
            verEl.className = "verandering " + (v >= 0 ? "positief" : "negatief");
          }
        });

        bijgewerktEl.textContent = "Bijgewerkt om " + new Date().toLocaleTimeString("nl-NL");
        rerenderPortfolio();
        if (detail.style.display === "block") updateOrderPaneel();
      } catch (fout) {
        bijgewerktEl.textContent = "Even niet bereikbaar...";
        console.log("Fout bij koersen:", fout);
      }
    }

    // ========================================================
    //  TERMINAL: candlestick-grafiek + MA + order-paneel
    // ========================================================
    let lwChart = null;       // de grafiek
    let candleSerie = null;   // de kaarsjes
    let maSeries = [];         // de MA-lijnen
    let laatsteCandles = [];   // bewaarde data, om MA te kunnen togglen
    let toonMA = false;

    function openTerminal(munt) {
      huidigeMunt = munt;
      const logoEl = document.getElementById("detail-logo");
      logoEl.textContent = munt.letter;
      logoEl.style.backgroundColor = munt.kleur;
      document.getElementById("detail-naam").textContent = munt.naam;
      document.getElementById("koop-ticker").textContent = munt.ticker;
      document.getElementById("verkoop-ticker").textContent = munt.ticker;
      document.getElementById("order-melding").textContent = "";
      document.getElementById("koop-bedrag").value = "";
      document.getElementById("verkoop-aantal").value = "";
      toonScherm("detail");
      updateOrderPaneel();
      tekenGrafiek();
    }

    document.getElementById("terugknop").addEventListener("click", function () { toonScherm("markten"); });

    document.querySelectorAll(".tijdknop").forEach(function (knop) {
      knop.addEventListener("click", function () {
        huidigInterval = knop.dataset.interval;
        huidigLimit = Number(knop.dataset.limit);
        document.querySelectorAll(".tijdknop").forEach(function (k) { k.classList.toggle("actief", k === knop); });
        tekenGrafiek();
      });
    });

    // NIEUW (B): MA aan/uit
    document.getElementById("ma-knop").addEventListener("click", function () {
      toonMA = !toonMA;
      this.classList.toggle("actief", toonMA);
      herteken(); // opnieuw tekenen vanuit bewaarde data (geen nieuwe download nodig)
    });

    async function tekenGrafiek() {
      const munt = huidigeMunt;
      const prijsEl = document.getElementById("detail-prijs");
      const verEl = document.getElementById("detail-ver");
      prijsEl.textContent = "laden...";
      verEl.textContent = "";

      const basis = "https://data-api.binance.vision/api/v3/klines";
      try {
        let quote = VALUTA[huidigeValuta].binance;
        let candles = await haalCandles(basis, munt.ticker + quote);
        if (!Array.isArray(candles) || candles.length === 0) {
          quote = "USDT";
          candles = await haalCandles(basis, munt.ticker + "USDT");
        }
        document.getElementById("detail-ticker").textContent = munt.ticker + " / " + quote;

        // NIEUW (A): zet de ruwe Binance-data om naar wat de grafiek wil:
        // { time, open, high, low, close }. 'time' moet in seconden (niet ms).
        laatsteCandles = candles.map(function (c) {
          return {
            time: Math.floor(c[0] / 1000),
            open: parseFloat(c[1]), high: parseFloat(c[2]),
            low: parseFloat(c[3]), close: parseFloat(c[4])
          };
        });

        const eerste = laatsteCandles[0].close;
        const laatste = laatsteCandles[laatsteCandles.length - 1].close;
        const pct = ((laatste - eerste) / eerste) * 100;
        const steeg = laatste >= eerste;
        const sym = (quote === "EUR") ? "\u20AC" : "$";
        prijsEl.textContent = formatMet(sym, laatste);
        const teken = pct >= 0 ? "+" : "";
        verEl.textContent = teken + pct.toFixed(2) + "% over deze periode";
        verEl.className = "detail-ver " + (steeg ? "positief" : "negatief");

        herteken();
      } catch (fout) {
        prijsEl.textContent = "Grafiek niet beschikbaar";
        console.log("Fout bij grafiek:", fout);
      }
    }

    // Tekent de grafiek vanuit de bewaarde candles (met of zonder MA).
    function herteken() {
      const container = document.getElementById("grafiek");

      // Oude grafiek opruimen (anders stapelen ze).
      if (lwChart) { lwChart.remove(); lwChart = null; maSeries = []; }

      lwChart = LightweightCharts.createChart(container, {
        width: container.clientWidth,
        height: 240,
        layout: { background: { color: "#18213A" }, textColor: "#8A93A8", fontFamily: "Inter" },
        grid: { vertLines: { color: "rgba(255,255,255,0.05)" }, horzLines: { color: "rgba(255,255,255,0.05)" } },
        timeScale: { timeVisible: true, secondsVisible: false, borderColor: "#263250" },
        rightPriceScale: { borderColor: "#263250" },
        crosshair: { mode: 0 }
      });

      candleSerie = lwChart.addCandlestickSeries({
        upColor: "#16C784", downColor: "#EA3943",
        borderUpColor: "#16C784", borderDownColor: "#EA3943",
        wickUpColor: "#16C784", wickDownColor: "#EA3943"
      });
      candleSerie.setData(laatsteCandles);

      // NIEUW (B): de MA-lijnen, als ze aanstaan.
      if (toonMA) {
        voegMAtoe(7,  "#3B82F6"); // 7-periode in blauw
        voegMAtoe(25, "#F7931A"); // 25-periode in oranje
      }

      lwChart.timeScale().fitContent();
    }

    // ========================================================
    //  NIEUW (B): een voortschrijdend gemiddelde berekenen.
    //  Een 'MA-7' is simpelweg: het gemiddelde van de laatste 7
    //  slotprijzen, voor elk punt opnieuw. Meer is een indicator niet!
    // ========================================================
    function voegMAtoe(periode, kleur) {
      const punten = [];
      for (let i = periode - 1; i < laatsteCandles.length; i++) {
        let som = 0;
        for (let j = i - periode + 1; j <= i; j++) som += laatsteCandles[j].close;
        punten.push({ time: laatsteCandles[i].time, value: som / periode });
      }
      const lijn = lwChart.addLineSeries({ color: kleur, lineWidth: 2, priceLineVisible: false, lastValueVisible: false });
      lijn.setData(punten);
      maSeries.push(lijn);
    }

    async function haalCandles(basis, paar) {
      const adres = basis + "?symbol=" + paar + "&interval=" + huidigInterval + "&limit=" + huidigLimit;
      return (await fetch(adres)).json();
    }

    // De grafiek meeschalen als het venster van grootte verandert.
    window.addEventListener("resize", function () {
      if (lwChart) lwChart.applyOptions({ width: document.getElementById("grafiek").clientWidth });
    });

    // ========================================================
    //  NIEUW (C): PAPER TRADING (nepgeld)
    // ========================================================
    let contant = 10000;   // start-kapitaal in nepgeld
    let bezit = {};         // muntId -> { aantal, gemKostprijs }

    // De Kopen/Verkopen-tabs.
    document.getElementById("tab-koop").addEventListener("click", function () { zetTab("koop"); });
    document.getElementById("tab-verkoop").addEventListener("click", function () { zetTab("verkoop"); });
    function zetTab(welke) {
      const tk = document.getElementById("tab-koop");
      const tv = document.getElementById("tab-verkoop");
      tk.className = "order-tab" + (welke === "koop" ? " actief-koop" : "");
      tv.className = "order-tab" + (welke === "verkoop" ? " actief-verkoop" : "");
      document.getElementById("koop-vak").style.display = (welke === "koop") ? "block" : "none";
      document.getElementById("verkoop-vak").style.display = (welke === "verkoop") ? "block" : "none";
      document.getElementById("order-melding").textContent = "";
    }

    // KOPEN: voor een bedrag aan munten kopen tegen de huidige prijs.
    document.getElementById("koop-knop").addEventListener("click", function () {
      const munt = huidigeMunt;
      const prijs = laatstePrijzen[munt.id];
      const bedrag = leesGetal("koop-bedrag");
      if (prijs === undefined) return melding("Prijs nog niet geladen, even wachten.", false);
      if (!(bedrag > 0)) return melding("Vul een geldig bedrag in.", false);
      if (bedrag > contant) return melding("Niet genoeg contant geld.", false);

      const aantal = bedrag / prijs;
      // Voeg toe aan je bezit en bereken de nieuwe gemiddelde kostprijs.
      const oud = bezit[munt.id];
      if (oud) {
        const totaalKosten = oud.aantal * oud.gemKostprijs + bedrag;
        const nieuwAantal = oud.aantal + aantal;
        bezit[munt.id] = { aantal: nieuwAantal, gemKostprijs: totaalKosten / nieuwAantal };
      } else {
        bezit[munt.id] = { aantal: aantal, gemKostprijs: prijs };
      }
      contant -= bedrag;
      document.getElementById("koop-bedrag").value = "";
      melding("Gekocht: " + aantal.toFixed(6) + " " + munt.ticker, true);
      updateOrderPaneel();
      rerenderPortfolio();
    });

    // VERKOPEN: een aantal munten verkopen tegen de huidige prijs.
    document.getElementById("verkoop-knop").addEventListener("click", function () {
      const munt = huidigeMunt;
      const prijs = laatstePrijzen[munt.id];
      const aantal = leesGetal("verkoop-aantal");
      const oud = bezit[munt.id];
      if (prijs === undefined) return melding("Prijs nog niet geladen, even wachten.", false);
      if (!oud || oud.aantal <= 0) return melding("Je hebt geen " + munt.ticker + " om te verkopen.", false);
      if (!(aantal > 0)) return melding("Vul een geldig aantal in.", false);
      if (aantal > oud.aantal + 1e-12) return melding("Je hebt maar " + oud.aantal.toFixed(6) + " " + munt.ticker + ".", false);

      const opbrengst = aantal * prijs;
      contant += opbrengst;
      oud.aantal -= aantal;
      if (oud.aantal < 1e-9) delete bezit[munt.id]; // alles verkocht
      document.getElementById("verkoop-aantal").value = "";
      melding("Verkocht: " + aantal.toFixed(6) + " " + munt.ticker, true);
      updateOrderPaneel();
      rerenderPortfolio();
    });

    // 'Alles'-knop: vul het hele bezit van deze munt in.
    document.getElementById("alles-knop").addEventListener("click", function () {
      const oud = bezit[huidigeMunt.id];
      document.getElementById("verkoop-aantal").value = oud ? String(oud.aantal) : "0";
    });

    function melding(tekst, goed) {
      const el = document.getElementById("order-melding");
      el.textContent = tekst;
      el.style.color = goed ? "var(--omhoog)" : "var(--omlaag)";
    }

    // Werk het saldo + bezit bovenin het order-paneel bij.
    function updateOrderPaneel() {
      if (!huidigeMunt) return;
      document.getElementById("order-cash").textContent = formatGeld(contant);
      const oud = bezit[huidigeMunt.id];
      const aantal = oud ? oud.aantal : 0;
      document.getElementById("order-bezit").textContent = aantal.toFixed(6) + " " + huidigeMunt.ticker;
    }

    // ===== PORTFOLIO (toont het paper-trading account) =====
    function rerenderPortfolio() {
      const positiesEl = document.getElementById("posities");
      const muntIds = Object.keys(bezit);

      let bezitWaarde = 0, html = "";
      if (muntIds.length === 0) {
        positiesEl.innerHTML = '<div class="leeg">Nog geen munten in bezit.<br>Koop iets via de terminal.</div>';
      } else {
        muntIds.forEach(function (id) {
          const munt = muntPerId[id];
          const pos = bezit[id];
          const prijs = laatstePrijzen[id];
          const waarde = (prijs !== undefined) ? pos.aantal * prijs : pos.aantal * pos.gemKostprijs;
          const kosten = pos.aantal * pos.gemKostprijs;
          const winst = waarde - kosten;
          const winstPct = (winst / kosten) * 100;
          bezitWaarde += waarde;
          const klasse = winst >= 0 ? "positief" : "negatief";
          const teken = winst >= 0 ? "+" : "";
          html +=
            '<div class="positie">' +
              '<div class="logo" style="background-color:' + munt.kleur + ';width:32px;height:32px;font-size:15px">' + munt.letter + '</div>' +
              '<div class="positie-info">' +
                '<div class="positie-naam">' + munt.naam + '</div>' +
                '<div class="positie-detail">' + pos.aantal.toFixed(6) + ' ' + munt.ticker + ' @ ' + formatExact(pos.gemKostprijs) + '</div>' +
              '</div>' +
              '<div class="positie-waarde">' +
                '<div class="positie-bedrag">' + formatGeld(waarde) + '</div>' +
                '<div class="positie-pnl ' + klasse + '">' + teken + formatGeld(winst) + ' (' + teken + winstPct.toFixed(1) + '%)</div>' +
              '</div>' +
            '</div>';
        });
        positiesEl.innerHTML = html;
      }

      const totaal = contant + bezitWaarde;
      const winstTotaal = totaal - 10000; // t.o.v. het startbedrag
      const pct = (winstTotaal / 10000) * 100;
      document.getElementById("totaal-waarde").textContent = formatGeld(totaal);
      const t = winstTotaal >= 0 ? "+" : "";
      const pnlEl = document.getElementById("totaal-pnl");
      pnlEl.textContent = t + formatGeld(winstTotaal) + " (" + t + pct.toFixed(2) + "%) sinds start";
      pnlEl.className = "balans-pnl " + (winstTotaal >= 0 ? "positief" : "negatief");
      document.getElementById("contant-saldo").textContent = formatGeld(contant);
      document.getElementById("bezit-saldo").textContent = formatGeld(bezitWaarde);
    }

    document.getElementById("reset-knop").addEventListener("click", function () {
      if (confirm("Simulatie resetten? Je begint weer met $10.000 en geen munten.")) {
        contant = 10000; bezit = {};
        rerenderPortfolio();
        if (detail.style.display === "block") updateOrderPaneel();
      }
    });

    // ===== NAVIGATIE =====
    function toonScherm(naam) {
      lijstscherm.style.display = "none";
      detail.style.display = "none";
      portfolioscherm.style.display = "none";
      if (naam === "markten") lijstscherm.style.display = "block";
      if (naam === "detail") detail.style.display = "block";
      if (naam === "portfolio") { portfolioscherm.style.display = "block"; rerenderPortfolio(); }
      document.getElementById("nav-markten").classList.toggle("actief", naam !== "portfolio");
      document.getElementById("nav-portfolio").classList.toggle("actief", naam === "portfolio");
    }
    document.getElementById("nav-markten").addEventListener("click", function () { toonScherm("markten"); });
    document.getElementById("nav-portfolio").addEventListener("click", function () { toonScherm("portfolio"); });

    document.getElementById("valuta-keuze").addEventListener("change", function () {
      huidigeValuta = this.value;
      updateLabels();
      haalKoersenOp();
      if (detail.style.display === "block") tekenGrafiek();
    });

    // ===== HULPJES =====
    function valutaSymbool() { return VALUTA[huidigeValuta].symbool; }
    function formatPrijs(p) { return formatMet(valutaSymbool(), p); }
    function formatMet(sym, p) {
      if (p >= 1000) return sym + p.toLocaleString("en-US", { maximumFractionDigits: 0 });
      if (p >= 1)    return sym + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return sym + p.toFixed(4);
    }
    function formatGeld(b) { return valutaSymbool() + b.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
    function formatExact(p) { return valutaSymbool() + p.toLocaleString("en-US", { maximumFractionDigits: 8 }); }
    function leesGetal(id) { return parseFloat(document.getElementById(id).value.replace(",", ".").trim()); }
    function flits(el, kleur) { el.style.color = kleur; setTimeout(function () { el.style.color = "var(--tekst)"; }, 600); }

    // ===== AAN DE SLAG =====
    bouwRijen();
    haalKoersenOp();
    setInterval(haalKoersenOp, 10000);

  </script>
</body>

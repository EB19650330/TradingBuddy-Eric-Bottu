<!DOCTYPE html>
<!--
  ============================================================
   FASE 2 - VAN ÉÉN MUNT NAAR EEN LIJST
  ============================================================

  Dit bouwt voort op je Bitcoin-pagina uit fase 1.
  Open het net zo: dubbelklikken, en het draait in je browser.

  WAT IS ER NIEUW TEN OPZICHTE VAN FASE 1?
  Drie dingen, en die zijn allemaal gemarkeerd met "NIEUW" in
  de comments hieronder:

  1. Een LIJST van munten (een 'array') in plaats van alleen
     Bitcoin. Je beschrijft elke munt één keer.

  2. Eén verzoek haalt nu ALLE koersen tegelijk op, in plaats
     van één munt.

  3. Een LOOP (herhaling) bouwt vanzelf een rij voor elke munt.
     Dit is de grote nieuwe truc: je schrijft de opmaak één keer,
     en de computer herhaalt hem voor elke munt.

  De rest (de kleuren, het ophalen, groen/rood) ken je al uit fase 1.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Live koersen</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">

  <style>
    /* Dezelfde kleuren als in fase 1 - niets veranderd. */
    :root {
      --achtergrond:   #0E1525;
      --kaart:         #18213A;
      --rand:          #263250;
      --tekst:         #E8ECF5;
      --tekst-zacht:   #8A93A8;
      --omhoog:        #16C784;
      --omlaag:        #EA3943;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--achtergrond);
      color: var(--tekst);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
    }

    .kaart {
      background-color: var(--kaart);
      border: 1px solid var(--rand);
      border-radius: 20px;
      padding: 28px;
      width: 100%;
      max-width: 460px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }

    /* De titelbalk bovenaan de kaart */
    .kop {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .titel { font-size: 20px; font-weight: 700; }

    .live {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px;
      color: var(--omhoog);
    }
    .stip {
      width: 8px; height: 8px; border-radius: 50%;
      background-color: var(--omhoog);
      animation: kloppen 1.6s ease-in-out infinite;
    }

    .subtitel {
      font-size: 13px;
      color: var(--tekst-zacht);
      margin-bottom: 20px;
    }

    /* NIEUW: opmaak voor één RIJ. Elke munt krijgt zo'n rij.
       We schrijven de opmaak hier één keer; de loop in de
       JavaScript maakt er straks meerdere van. */
    .rij {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 0;
      border-top: 1px solid var(--rand);
    }
    .rij:first-of-type { border-top: none; }

    /* Het ronde gekleurde logo met een letter erin */
    .logo {
      width: 38px; height: 38px;
      border-radius: 50%;
      color: #fff;
      font-weight: 700; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }

    /* De naam + ticker, links uitgelijnd */
    .naam-blok { flex: 1; }
    .naam   { font-weight: 600; font-size: 15px; }
    .ticker { color: var(--tekst-zacht); font-size: 12px; }

    /* De prijs + verandering, rechts uitgelijnd */
    .prijs-blok { text-align: right; }
    .prijs {
      font-family: 'Space Mono', monospace;
      font-weight: 700; font-size: 17px;
      transition: color 0.6s ease;  /* voor de kleur-flits */
    }
    .verandering {
      font-family: 'Space Mono', monospace;
      font-size: 13px; margin-top: 2px;
    }
    .positief { color: var(--omhoog); }
    .negatief { color: var(--omlaag); }

    .voet {
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--rand);
      font-size: 12px;
      color: var(--tekst-zacht);
      display: flex; justify-content: space-between;
    }

    @keyframes kloppen {
      0%, 100% { opacity: 1;   transform: scale(1);   }
      50%      { opacity: 0.4; transform: scale(0.8); }
    }
    @media (prefers-reduced-motion: reduce) {
      .stip { animation: none; }
    }
  </style>
</head>

<body>

  <div class="kaart">
    <div class="kop">
      <div class="titel">Markten</div>
      <div class="live"><span class="stip"></span>LIVE</div>
    </div>
    <div class="subtitel">Live koersen in USD</div>

    <!-- NIEUW: deze container is nog leeg. De JavaScript vult hem
         straks met een rij per munt. Vergelijk het met een mandje
         waar de loop de rijen in legt. -->
    <div id="lijst"></div>

    <div class="voet">
      <span>Bron: CoinGecko</span>
      <span id="bijgewerkt">&nbsp;</span>
    </div>
  </div>

  <script>

    // ========================================================
    //  NIEUW (1): DE LIJST VAN MUNTEN
    //  Dit is het hart van fase 2. We beschrijven elke munt één
    //  keer met: het CoinGecko-id, de naam, de ticker, de letter
    //  voor het logo, en de kleur van het logo.
    //
    //  Wil je een munt toevoegen? Kopieer één regel en pas hem aan.
    //  Wil je er een weghalen? Verwijder de regel. That's it.
    // ========================================================
    const MUNTEN = [
      { id: "bitcoin",  naam: "Bitcoin",  ticker: "BTC",  letter: "B", kleur: "#F7931A" },
      { id: "ethereum", naam: "Ethereum", ticker: "ETH",  letter: "E", kleur: "#627EEA" },
      { id: "solana",   naam: "Solana",   ticker: "SOL",  letter: "S", kleur: "#14B88A" },
      { id: "ripple",   naam: "XRP",      ticker: "XRP",  letter: "X", kleur: "#23A0D8" },
      { id: "cardano",  naam: "Cardano",  ticker: "ADA",  letter: "A", kleur: "#3468D1" },
      { id: "dogecoin", naam: "Dogecoin", ticker: "DOGE", letter: "D", kleur: "#C2A633" },
    ];

    // We pakken de lege lijst-container en het 'bijgewerkt'-regeltje vast.
    const lijstEl      = document.getElementById("lijst");
    const bijgewerktEl = document.getElementById("bijgewerkt");

    // We onthouden de vorige prijs PER munt (om groen/rood te flitsen).
    const vorigePrijzen = {};

    // ========================================================
    //  Bouw eenmalig de lege rijen op - één per munt.
    //  Dit draait maar één keer, bij het laden van de pagina.
    // ========================================================
    function bouwRijen() {
      // NIEUW (3): DE LOOP. 'forEach' betekent: doe het volgende
      // voor ELKE munt in de lijst. De code binnenin wordt dus
      // zes keer uitgevoerd - één keer per munt.
      MUNTEN.forEach(function (munt) {
        // We maken een stukje HTML voor deze ene munt.
        // De prijs laten we nog even leeg ('...'); die vullen
        // we zo met de echte, live waarde.
        const rij = document.createElement("div");
        rij.className = "rij";
        rij.innerHTML =
          '<div class="logo" style="background-color:' + munt.kleur + '">'
            + munt.letter +
          '</div>' +
          '<div class="naam-blok">' +
            '<div class="naam">' + munt.naam + '</div>' +
            '<div class="ticker">' + munt.ticker + ' / USD</div>' +
          '</div>' +
          '<div class="prijs-blok">' +
            // id="prijs-bitcoin" enz. - zo vindt de update straks
            // de juiste plek terug voor elke munt.
            '<div class="prijs" id="prijs-' + munt.id + '">...</div>' +
            '<div class="verandering" id="ver-' + munt.id + '">&nbsp;</div>' +
          '</div>';
        lijstEl.appendChild(rij); // leg de rij in de lijst
      });
    }

    // ========================================================
    //  NIEUW (2): HAAL ALLE KOERSEN IN ÉÉN KEER OP
    //  In fase 1 vroegen we alleen 'bitcoin'. Nu plakken we alle
    //  munt-id's achter elkaar (bitcoin,ethereum,solana,...) zodat
    //  CoinGecko ze in één antwoord teruggeeft. Efficiënt!
    // ========================================================
    async function haalKoersenOp() {
      try {
        // Maak de lijst van id's: "bitcoin,ethereum,solana,..."
        const ids = MUNTEN.map(function (m) { return m.id; }).join(",");

        const adres = "https://api.coingecko.com/api/v3/simple/price"
                    + "?ids=" + ids
                    + "&vs_currencies=usd&include_24hr_change=true";

        const antwoord = await fetch(adres);
        const gegevens = await antwoord.json();

        // Loop opnieuw door de munten en vul nu de echte cijfers in.
        MUNTEN.forEach(function (munt) {
          const data = gegevens[munt.id];
          if (!data) return; // sla over als deze munt ontbreekt

          const prijs       = data.usd;
          const verandering = data.usd_24h_change;

          // Vind de plekjes voor déze munt terug.
          const prijsEl = document.getElementById("prijs-" + munt.id);
          const verEl   = document.getElementById("ver-" + munt.id);

          // Prijs netjes opmaken. Goedkope munten (onder $1) tonen
          // we met meer cijfers achter de komma, dure munten met komma's.
          if (prijs >= 1) {
            prijsEl.textContent = "$" + prijs.toLocaleString("en-US", {
              maximumFractionDigits: 0
            });
          } else {
            prijsEl.textContent = "$" + prijs.toFixed(4);
          }

          // Kleur-flits bij verandering (precies als in fase 1,
          // maar nu per munt).
          const vorige = vorigePrijzen[munt.id];
          if (vorige !== undefined) {
            if (prijs > vorige) flits(prijsEl, "var(--omhoog)");
            else if (prijs < vorige) flits(prijsEl, "var(--omlaag)");
          }
          vorigePrijzen[munt.id] = prijs;

          // De 24-uurs verandering, met + of - en in groen/rood.
          const teken = verandering >= 0 ? "+" : "";
          verEl.textContent = teken + verandering.toFixed(2) + "%";
          verEl.className = "verandering "
            + (verandering >= 0 ? "positief" : "negatief");
        });

        // Tijd van laatste update.
        const nu = new Date();
        bijgewerktEl.textContent = "Bijgewerkt om " + nu.toLocaleTimeString("nl-NL");

      } catch (fout) {
        bijgewerktEl.textContent = "Even niet bereikbaar...";
        console.log("Er ging iets mis:", fout);
      }
    }

    // Hulpje: laat een prijs kort oplichten (zelfde idee als fase 1).
    function flits(element, kleur) {
      element.style.color = kleur;
      setTimeout(function () {
        element.style.color = "var(--tekst)";
      }, 600);
    }

    // ========================================================
    //  AAN DE SLAG
    // ========================================================
    bouwRijen();        // eerst de lege rijen neerzetten
    haalKoersenOp();    // meteen de koersen ophalen
    setInterval(haalKoersenOp, 10000); // en elke 10 seconden opnieuw

  </script>
</body>
</html>

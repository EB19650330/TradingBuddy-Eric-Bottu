/* ═══════════════════════════════════════════════════════════════════════════
   INDICATOR CALCULATIONS
   ═══════════════════════════════════════════════════════════════════════════ */

const sma = (arr, period) => {
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    if (i < period - 1) {
      out.push(NaN);
      continue;
    }
    let s = 0;
    for (let j = i - period + 1; j <= i; j++) s += arr[j];
    out.push(s / period);
  }
  return out;
};

const ema = (arr, period) => {
  const out = [];
  const k = 2 / (period + 1);
  let prev;
  for (let i = 0; i < arr.length; i++) {
    if (i === 0) {
      out.push(arr[0]);
      prev = arr[0];
    } else {
      const v = arr[i] * k + prev * (1 - k);
      out.push(v);
      prev = v;
    }
  }
  return out;
};

const stdev = (arr, period) => {
  const out = [];
  for (let i = 0; i < arr.length; i++) {
    if (i < period - 1) {
      out.push(NaN);
      continue;
    }
    let mean = 0;
    for (let j = i - period + 1; j <= i; j++) mean += arr[j];
    mean /= period;
    let v = 0;
    for (let j = i - period + 1; j <= i; j++) v += (arr[j] - mean) ** 2;
    out.push(Math.sqrt(v / period));
  }
  return out;
};

const bollingerBands = (closes, period = 20, mult = 2) => {
  const mid = sma(closes, period);
  const sd = stdev(closes, period);
  return {
    middle: mid,
    upper: mid.map((m, i) => m + mult * sd[i]),
    lower: mid.map((m, i) => m - mult * sd[i]),
  };
};

const stochastic = (highs, lows, closes, period = 14, smoothK = 3, smoothD = 3) => {
  const rawK = [];
  for (let i = 0; i < closes.length; i++) {
    if (i < period - 1) {
      rawK.push(NaN);
      continue;
    }
    let hh = -Infinity,
      ll = Infinity;
    for (let j = i - period + 1; j <= i; j++) {
      if (highs[j] > hh) hh = highs[j];
      if (lows[j] < ll) ll = lows[j];
    }
    const range = hh - ll;
    rawK.push(range === 0 ? 0 : ((closes[i] - ll) / range) * 100);
  }
  const k = sma(rawK, smoothK);
  const d = sma(k, smoothD);
  return { k, d };
};

const macd = (closes, fast = 12, slow = 26, signalP = 9) => {
  const ef = ema(closes, fast);
  const es = ema(closes, slow);
  const macdLine = ef.map((v, i) => v - es[i]);
  // Signal: EMA of MACD line starting from index slow-1
  const valid = macdLine.slice(slow - 1);
  const sig = ema(valid, signalP);
  const padded = new Array(slow - 1).fill(NaN).concat(sig);
  return { macd: macdLine, signal: padded };
};

const rsi = (closes, period = 14) => {
  const out = new Array(closes.length).fill(NaN);
  if (closes.length < period + 1) return out;
  const gains = [],
    losses = [];
  for (let i = 1; i < closes.length; i++) {
    const ch = closes[i] - closes[i - 1];
    gains.push(Math.max(ch, 0));
    losses.push(Math.max(-ch, 0));
  }
  let ag = 0,
    al = 0;
  for (let i = 0; i < period; i++) {
    ag += gains[i];
    al += losses[i];
  }
  ag /= period;
  al /= period;
  out[period] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  for (let i = period; i < gains.length; i++) {
    ag = (ag * (period - 1) + gains[i]) / period;
    al = (al * (period - 1) + losses[i]) / period;
    out[i + 1] = al === 0 ? 100 : 100 - 100 / (1 + ag / al);
  }
  return out;
};

const stochRSI = (closes, period = 14, kS = 3, dS = 3) => {
  const r = rsi(closes, period);
  const raw = new Array(r.length).fill(NaN);
  for (let i = 0; i < r.length; i++) {
    if (i < period * 2 - 1) continue;
    let hh = -Infinity,
      ll = Infinity;
    for (let j = i - period + 1; j <= i; j++) {
      if (!isNaN(r[j])) {
        if (r[j] > hh) hh = r[j];
        if (r[j] < ll) ll = r[j];
      }
    }
    const range = hh - ll;
    raw[i] = range === 0 ? 0 : ((r[i] - ll) / range) * 100;
  }
  const k = sma(raw, kS);
  const d = sma(k, dS);
  return { k, d };
};

const mfi = (highs, lows, closes, volumes, period = 14) => {
  const tp = closes.map((c, i) => (highs[i] + lows[i] + c) / 3);
  const mflow = tp.map((t, i) => t * volumes[i]);
  const out = new Array(closes.length).fill(NaN);
  for (let i = period; i < closes.length; i++) {
    let pos = 0,
      neg = 0;
    for (let j = i - period + 1; j <= i; j++) {
      if (tp[j] > tp[j - 1]) pos += mflow[j];
      else if (tp[j] < tp[j - 1]) neg += mflow[j];
    }
    out[i] = neg === 0 ? 100 : 100 - 100 / (1 + pos / neg);
  }
  return out;
};

// Peaks & Troughs via simple lookback (zig-zag style)
const findPeaksTroughs = (highs, lows, lookback = 3) => {
  const peaks = [],
    troughs = [];
  for (let i = lookback; i < highs.length - lookback; i++) {
    let isP = true,
      isT = true;
    for (let j = 1; j <= lookback; j++) {
      if (highs[i] <= highs[i - j] || highs[i] <= highs[i + j]) isP = false;
      if (lows[i] >= lows[i - j] || lows[i] >= lows[i + j]) isT = false;
    }
    if (isP) peaks.push({ i, v: highs[i] });
    if (isT) troughs.push({ i, v: lows[i] });
  }
  return { peaks, troughs };
};

// ── WGHM (Weighted Gauge / Histogram Momentum) — eigen benadering ─────
// Combineert RSI + MFI + volume-richting tot Long / Short / Neutral
const computeWGHM = (data, indicators) => {
  const { closes, opens, volumes, highs, lows } = data;
  const lc = closes.length - 2;
  const r = indicators.r[lc];
  const mf = indicators.mf[lc];

  // ── RSI score (mean-reversion logica) ────────────────────────────────
  // Diep oversold = koopkans (BUY+), overbought = verkoopkans (SELL-)
  let rsiScore = 0;
  if (!isNaN(r)) {
    if (r < 25) rsiScore = 2;       // extreem oversold → sterke BUY
    else if (r < 35) rsiScore = 1;  // oversold → BUY
    else if (r > 75) rsiScore = -2; // extreem overbought → sterke SELL
    else if (r > 65) rsiScore = -1; // overbought → SELL
  }

  // ── MFI score (zelfde logica) ────────────────────────────────────────
  let mfiScore = 0;
  if (!isNaN(mf)) {
    if (mf < 20) mfiScore = 2;
    else if (mf < 35) mfiScore = 1;
    else if (mf > 80) mfiScore = -2;
    else if (mf > 65) mfiScore = -1;
  }

  // ── Reversal-bevestiging: laatste candle vs voorgaande ───────────────
  // Bij oversold + groene candle die hoger sluit = bounce begint
  // Bij overbought + rode candle die lager sluit = top reversal
  let reversalScore = 0;
  if (lc >= 1) {
    const lastGreen = closes[lc] > opens[lc];
    const lastRed = closes[lc] < opens[lc];
    const prevRed = closes[lc - 1] < opens[lc - 1];
    const prevGreen = closes[lc - 1] > opens[lc - 1];

    // Bullish reversal: vorige rood, huidige groen, near oversold
    if (lastGreen && prevRed && (r < 40 || mf < 40)) reversalScore = 2;
    else if (lastGreen && (r < 40 || mf < 40)) reversalScore = 1;
    // Bearish reversal: vorige groen, huidige rood, near overbought
    else if (lastRed && prevGreen && (r > 60 || mf > 60)) reversalScore = -2;
    else if (lastRed && (r > 60 || mf > 60)) reversalScore = -1;
  }

  // ── Volume-confirmatie: bij reversal-candle, hoog volume = bevestiging
  let volScore = 0;
  if (lc >= 10) {
    let avgVol = 0;
    for (let i = lc - 10; i < lc; i++) avgVol += volumes[i];
    avgVol /= 10;
    const curVol = volumes[lc];
    if (avgVol > 0) {
      const ratio = curVol / avgVol;
      // Hoog volume + bullish reversal context = sterk
      if (ratio > 2 && reversalScore > 0) volScore = 1;
      else if (ratio > 2 && reversalScore < 0) volScore = -1;
      // Hoog volume zonder context: subtiel zwak (verdacht)
      else if (ratio > 3) volScore = reversalScore > 0 ? 1 : -1;
    }
  }

  // ── Totaal: -7 (zwaar SELL) tot +7 (zwaar BUY) ───────────────────────
  const total = rsiScore + mfiScore + reversalScore + volScore;

  if (total >= 5) return "High - BUY";
  if (total >= 3) return "Mid - BUY";
  if (total >= 1) return "Low - BUY";
  if (total <= -5) return "High - SELL";
  if (total <= -3) return "Mid - SELL";
  if (total <= -1) return "Low - SELL";
  return "None - Neutral";
};

// ── LiqBox — zoek zwaarste volume-zone in historie ────────────────────
// Geeft de high/low en delta % terug van de candle met hoogste volume
const computeLiqBox = (data) => {
  const { times, highs, lows, closes, volumes } = data;
  const lc = closes.length - 2;
  if (lc < 50) return null;

  // Zoek index met hoogste volume in de hele historie (excl. laatste 5)
  let maxIdx = -1, maxVol = -1;
  for (let i = 0; i < lc - 5; i++) {
    if (volumes[i] > maxVol) {
      maxVol = volumes[i];
      maxIdx = i;
    }
  }
  if (maxIdx < 0) return null;

  const high = highs[maxIdx];
  const low = lows[maxIdx];
  const mid = (high + low) / 2;
  const curPrice = closes[lc];
  const deltaPct = ((curPrice - mid) / mid) * 100;
  const rangePct = ((high - low) / low) * 100;

  return {
    time: times[maxIdx],
    high,
    low,
    deltaPct,
    rangePct,
  };
};

// ── Bullish/Bearish RSI-divergentie detectie ──────────────────────────
const detectDivergence = (data, indicators, lookbackCandles = 30) => {
  const { lows, highs } = data;
  const r = indicators.r;
  const lc = lows.length - 2;
  if (lc < 5 || !r || r.length < lc) return null;

  const findLocalLows = (start, end) => {
    const points = [];
    for (let i = start; i <= end; i++) {
      if (i < 2 || i > lows.length - 3) continue;
      if (
        lows[i] < lows[i - 1] &&
        lows[i] < lows[i - 2] &&
        lows[i] < lows[i + 1] &&
        lows[i] < lows[i + 2]
      ) {
        points.push({ idx: i, price: lows[i], rsi: r[i] });
      }
    }
    return points;
  };

  const findLocalHighs = (start, end) => {
    const points = [];
    for (let i = start; i <= end; i++) {
      if (i < 2 || i > highs.length - 3) continue;
      if (
        highs[i] > highs[i - 1] &&
        highs[i] > highs[i - 2] &&
        highs[i] > highs[i + 1] &&
        highs[i] > highs[i + 2]
      ) {
        points.push({ idx: i, price: highs[i], rsi: r[i] });
      }
    }
    return points;
  };

  const startIdx = Math.max(0, lc - lookbackCandles);
  const lows_pts = findLocalLows(startIdx, lc);
  let bullDiv = null;
  if (lows_pts.length >= 2) {
    const last = lows_pts[lows_pts.length - 1];
    for (let j = lows_pts.length - 2; j >= 0; j--) {
      const prev = lows_pts[j];
      if (last.idx - prev.idx < 3) continue;
      if (last.idx - prev.idx > lookbackCandles) break;
      if (last.price < prev.price && last.rsi > prev.rsi && !isNaN(last.rsi) && !isNaN(prev.rsi)) {
        bullDiv = {
          type: "bullish",
          lastIdx: last.idx,
          prevIdx: prev.idx,
          lastPrice: last.price,
          prevPrice: prev.price,
          lastRsi: last.rsi,
          prevRsi: prev.rsi,
          candlesAgo: lc - last.idx,
        };
        break;
      }
    }
  }

  const highs_pts = findLocalHighs(startIdx, lc);
  let bearDiv = null;
  if (highs_pts.length >= 2) {
    const last = highs_pts[highs_pts.length - 1];
    for (let j = highs_pts.length - 2; j >= 0; j--) {
      const prev = highs_pts[j];
      if (last.idx - prev.idx < 3) continue;
      if (last.idx - prev.idx > lookbackCandles) break;
      if (last.price > prev.price && last.rsi < prev.rsi && !isNaN(last.rsi) && !isNaN(prev.rsi)) {
        bearDiv = {
          type: "bearish",
          lastIdx: last.idx,
          prevIdx: prev.idx,
          lastPrice: last.price,
          prevPrice: prev.price,
          lastRsi: last.rsi,
          prevRsi: prev.rsi,
          candlesAgo: lc - last.idx,
        };
        break;
      }
    }
  }

  if (bullDiv && bearDiv) {
    return bullDiv.lastIdx > bearDiv.lastIdx ? bullDiv : bearDiv;
  }
  return bullDiv || bearDiv || null;
};

// ── SPH (Sterke Paniek-Hit) — detecteer paniek-candles ─────────────────
// Een paniek-candle: candle met daling (open→close of high→low) ≥ drempel
// Bij meerdere opeenvolgende paniek-candles wordt het aantal geteld.
// Geeft de meest recente paniek-cluster terug binnen het tijdvenster.
const detectSPH = (data, thresholdPct, lookbackCandles) => {
  const { times, opens, highs, lows, closes } = data;
  const n = closes.length;
  // We kijken naar afgelopen `lookbackCandles` *complete* candles (excl. in-progress)
  const startIdx = Math.max(0, n - 1 - lookbackCandles);
  const endIdx = n - 2; // last complete

  // Markeer welke candles "paniek" zijn
  const isPanic = [];
  for (let i = startIdx; i <= endIdx; i++) {
    if (opens[i] === 0) {
      isPanic.push(false);
      continue;
    }
    // Daling van open naar low (worst case binnen de candle)
    const dropFromOpen = ((opens[i] - lows[i]) / opens[i]) * 100;
    // Daling van open naar close (effectief)
    const closeDrop = ((opens[i] - closes[i]) / opens[i]) * 100;
    // Een paniek-candle: rood + daling ≥ drempel
    const isRed = closes[i] < opens[i];
    isPanic.push(isRed && Math.max(dropFromOpen, closeDrop) >= thresholdPct);
  }

  // Vind de meest recente cluster van opeenvolgende paniek-candles
  let bestCluster = null;
  for (let i = isPanic.length - 1; i >= 0; i--) {
    if (isPanic[i]) {
      // Tel hoeveel opeenvolgend (terug in de tijd)
      let count = 1;
      let totalDropPct = 0;
      let clusterEndIdx = startIdx + i;
      let clusterStartIdx = clusterEndIdx;
      // Bereken cumulatieve daling van open van eerste paniek-candle tot low/close van laatste
      let j = i;
      while (j > 0 && isPanic[j - 1]) {
        j--;
        count++;
        clusterStartIdx = startIdx + j;
      }
      const clusterOpen = opens[clusterStartIdx];
      const clusterLow = Math.min(...lows.slice(clusterStartIdx, clusterEndIdx + 1));
      const clusterClose = closes[clusterEndIdx];
      const totalDrop = ((clusterOpen - Math.min(clusterLow, clusterClose)) / clusterOpen) * 100;

      bestCluster = {
        time: times[clusterEndIdx],
        startTime: times[clusterStartIdx],
        count,
        dropPct: totalDrop,
        currentPrice: closes[endIdx],
      };
      break; // meest recente
    }
  }

  return bestCluster;
};

/* ═══════════════════════════════════════════════════════════════════════════
   STRATEGY EVALUATORS
   Returns { hit: bool, reason: string }
   ═══════════════════════════════════════════════════════════════════════════ */

// Helper: index of last COMPLETE candle = length - 2 (last is in-progress)
const evalStrategies = (data, picked) => {
  const { opens, highs, lows, closes, volumes } = data;
  const n = closes.length;
  const lc = n - 2; // last complete index
  if (lc < 30) return [];

  const bb = bollingerBands(closes, 20, 2);
  const sto = stochastic(highs, lows, closes, 14, 3, 3);
  const m = macd(closes, 12, 26, 9);
  const r = rsi(closes, 14);
  const sr = stochRSI(closes, 14, 3, 3);
  const mf = mfi(highs, lows, closes, volumes, 14);
  const pt = findPeaksTroughs(highs, lows, 3);

  const hits = [];

  // ── stobbnomargin (LONG entry) ───────────────────────────────────────
  if (picked.stobbnomargin) {
    const k = sto.k[lc],
      d = sto.d[lc];
    const stochOK = !isNaN(k) && !isNaN(d) && k < 20 && d < 20;
    const isGreen = closes[lc] >= opens[lc];
    const refPrice = isGreen ? opens[lc] : closes[lc];
    const bbOK = !isNaN(bb.lower[lc]) && refPrice < bb.lower[lc];
    const last14 = volumes.slice(lc - 13, lc + 1);
    const novol = last14.filter((v) => v === 0).length;
    const volOK = novol <= 4;
    if (stochOK && bbOK && volOK)
      hits.push({ id: "stobbnomargin", side: "long", label: "STOBB no Margin" });
  }

  // ── macdxup (LONG entry) ─────────────────────────────────────────────
  if (picked.macdxup) {
    const cur = m.macd[lc],
      curS = m.signal[lc];
    const prev = m.macd[lc - 1],
      prevS = m.signal[lc - 1];
    if (
      !isNaN(cur) &&
      !isNaN(curS) &&
      !isNaN(prev) &&
      !isNaN(prevS) &&
      prev <= prevS &&
      cur > curS
    )
      hits.push({ id: "macdxup", side: "long", label: "MACD Cross Up" });
  }

  // ── stoxupos (LONG entry) ─────────────────────────────────────────────
  if (picked.stoxupos) {
    const k = sto.k[lc],
      d = sto.d[lc];
    const pk = sto.k[lc - 1],
      pd = sto.d[lc - 1];
    if (
      !isNaN(k) &&
      !isNaN(d) &&
      !isNaN(pk) &&
      !isNaN(pd) &&
      d < 20 &&
      pk <= pd &&
      k > d
    )
      hits.push({ id: "stoxupos", side: "long", label: "Stoch Oversold X-up" });
  }

  // ── pt (LONG entry) ──────────────────────────────────────────────────
  if (picked.pt) {
    if (pt.peaks.length >= 2 && pt.troughs.length >= 2) {
      const p2 = pt.peaks.slice(-2);
      const t2 = pt.troughs.slice(-2);
      if (p2[1].v > p2[0].v && t2[1].v > t2[0].v)
        hits.push({ id: "pt", side: "long", label: "Peaks & Troughs HH/HL" });
    }
  }

  // ── stobbexit (SHORT / EXIT) ─────────────────────────────────────────
  if (picked.stobbexit) {
    const isGreen = closes[lc] >= opens[lc];
    const refPrice = isGreen ? closes[lc] : opens[lc];
    if (!isNaN(bb.upper[lc]) && refPrice >= bb.upper[lc])
      hits.push({ id: "stobbexit", side: "short", label: "STOBB Exit" });
  }

  // ── macdxdown (SHORT) ─────────────────────────────────────────────────
  if (picked.macdxdown) {
    const cur = m.macd[lc],
      curS = m.signal[lc];
    const prev = m.macd[lc - 1],
      prevS = m.signal[lc - 1];
    if (
      !isNaN(cur) &&
      !isNaN(curS) &&
      !isNaN(prev) &&
      !isNaN(prevS) &&
      prev >= prevS &&
      cur < curS
    )
      hits.push({ id: "macdxdown", side: "short", label: "MACD Cross Down" });
  }

  // ── stoxdownob (SHORT) ────────────────────────────────────────────────
  if (picked.stoxdownob) {
    const k = sto.k[lc],
      d = sto.d[lc];
    const pk = sto.k[lc - 1],
      pd = sto.d[lc - 1];
    if (
      !isNaN(k) &&
      !isNaN(d) &&
      !isNaN(pk) &&
      !isNaN(pd) &&
      d > 80 &&
      pk >= pd &&
      k < d
    )
      hits.push({ id: "stoxdownob", side: "short", label: "Stoch Overbought X-dn" });
  }

  // ── ptexit (SHORT) ────────────────────────────────────────────────────
  if (picked.ptexit) {
    if (pt.peaks.length >= 2 && pt.troughs.length >= 2) {
      const p2 = pt.peaks.slice(-2);
      const t2 = pt.troughs.slice(-2);
      if (p2[1].v < p2[0].v && t2[1].v < t2[0].v)
        hits.push({ id: "ptexit", side: "short", label: "Peaks & Troughs LH/LL" });
    }
  }

  return {
    hits,
    metrics: {
      lc,
      bb,
      sto,
      m,
      r,
      sr,
      mf,
      pt,
    },
  };
};

/* ═══════════════════════════════════════════════════════════════════════════
   BINANCE API HELPERS — Spot/Futures × USDT/USDC

const apiBase = (market) =>
  market === "futures" ? "https://fapi.binance.com/fapi/v1" : "https://api.binance.com/api/v3";

const fetchTopSymbols = async (market, quote, minVol, limit = 200) => {
  const r = await fetch(`${apiBase(market)}/ticker/24hr`);
  if (!r.ok) throw new Error("Ticker fetch failed");
  const all = await r.json();
  const suffix = quote; // "USDT" or "USDC"
  return all
    .filter(
      (t) =>
        t.symbol.endsWith(suffix) &&
        !t.symbol.includes("UP" + suffix) &&
        !t.symbol.includes("DOWN" + suffix) &&
        !t.symbol.includes("BULL" + suffix) &&
        !t.symbol.includes("BEAR" + suffix) &&
        parseFloat(t.quoteVolume) >= minVol
    )
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, limit)
    .map((t) => t.symbol);
};

const fetchKlines = async (market, symbol, interval, limit = 120) => {
  const url = `${apiBase(market)}/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`;
  const r = await fetch(url);
  if (!r.ok) throw new Error(`Klines failed for ${symbol}`);
  const k = await r.json();
  return {
    times: k.map((c) => c[0]),
    opens: k.map((c) => parseFloat(c[1])),
    highs: k.map((c) => parseFloat(c[2])),
    lows: k.map((c) => parseFloat(c[3])),
    closes: k.map((c) => parseFloat(c[4])),
    volumes: k.map((c) => parseFloat(c[5])),
    quoteVolumes: k.map((c) => parseFloat(c[7])),
  };
};

const fetch24hrTicker = async (market, symbol) => {
  const r = await fetch(
    `${apiBase(market)}/ticker/24hr?symbol=${symbol}`
  );
  if (!r.ok) return null;
  return r.json();
};

/* ═══════════════════════════════════════════════════════════════════════════
   FORMATTERS

const fmtPrice = (p) => {
  if (p >= 100) return p.toFixed(2);
  if (p >= 1) return p.toFixed(4);
  if (p >= 0.01) return p.toFixed(5);
  return p.toFixed(8);
};

const fmtNum = (n, dec = 1) => {
  if (n === undefined || n === null || isNaN(n)) return "—";
  if (Math.abs(n) >= 1e9) return (n / 1e9).toFixed(dec) + "B";
  if (Math.abs(n) >= 1e6) return (n / 1e6).toFixed(dec) + "M";
  if (Math.abs(n) >= 1e3) return (n / 1e3).toFixed(dec) + "K";
  return n.toFixed(dec);
};

// Kleur-mapping voor WGHM (CryptoCoiners stijl)
const wghmStyle = (wghm) => {
  // Kleur, emoji-vierkant, en sterk-bevestiging-richting
  if (wghm === "High - BUY") return { color: "#dc2626", emoji: "🟥", side: "long" }; // rood (sterk)
  if (wghm === "Mid - BUY") return { color: "#f97316", emoji: "🟧", side: "long" }; // oranje
  if (wghm === "Low - BUY") return { color: "#eab308", emoji: "🟨", side: "long" }; // geel
  if (wghm === "High - SELL") return { color: "#7c3aed", emoji: "🟪", side: "short" }; // paars
  if (wghm === "Mid - SELL") return { color: "#2563eb", emoji: "🟦", side: "short" }; // blauw
  if (wghm === "Low - SELL") return { color: "#0891b2", emoji: "🟦", side: "short" }; // cyaan
  return { color: "#9ca3af", emoji: "⬜", side: "neutral" }; // grijs / neutraal
};

const tfToMs = (tf) => {
  const map = {
    "1m": 60e3,
    "3m": 180e3,
    "5m": 300e3,
    "15m": 900e3,
    "30m": 1800e3,
    "1h": 3600e3,
    "2h": 7200e3,
    "4h": 14400e3,
  };
  return map[tf] || 300e3;
};

const fmtTime = (ms) => {
  const d = new Date(ms);
  const pad = (x) => String(x).padStart(2, "0");
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())} ${pad(
    d.getHours()
  )}:${pad(d.getMinutes())}`;
};

// ── Alert helpers ──────────────────────────────────────────────────────
const playAlertSound = () => {
  try {
    const Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return;
    const ctx = new Ctx();
    const now = ctx.currentTime;
    [
      { freq: 880, start: 0, dur: 0.12 },
      { freq: 1320, start: 0.18, dur: 0.16 },
    ].forEach(({ freq, start, dur }) => {
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.type = "sine";
      osc.frequency.value = freq;
      gain.gain.setValueAtTime(0, now + start);
      gain.gain.linearRampToValueAtTime(0.18, now + start + 0.02);
      gain.gain.linearRampToValueAtTime(0, now + start + dur);
      osc.connect(gain).connect(ctx.destination);
      osc.start(now + start);
      osc.stop(now + start + dur + 0.05);
    });
    setTimeout(() => ctx.close(), 1000);
  } catch (e) {
    console.warn("Beep failed", e);
  }
};

const sendBrowserNotif = (title, body) => {
  if (typeof Notification === "undefined") return;
  if (Notification.permission !== "granted") return;
  try {
    const n = new Notification(title, {
      body,
      icon:
        "data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%2322c55e'/><text x='50' y='65' text-anchor='middle' font-size='50'>📈</text></svg>",
      tag: "cc-scanner-signal",
    });
    setTimeout(() => n.close(), 8000);
  } catch (e) {
    console.warn("Notification failed", e);
  }
};

let flashOriginalTitle = null;
let flashInterval = null;
const flashTabTitle = (newSignals) => {
  if (typeof document === "undefined") return;
  if (!flashOriginalTitle) flashOriginalTitle = document.title;
  if (flashInterval) clearInterval(flashInterval);
  let toggle = true;
  const flashed = `🚨 ${newSignals} nieuw${newSignals > 1 ? "e" : ""} signaa${
    newSignals > 1 ? "len" : "l"
  }!`;
  flashInterval = setInterval(() => {
    document.title = toggle ? flashed : flashOriginalTitle;
    toggle = !toggle;
  }, 800);
  const onFocus = () => {
    if (flashInterval) {
      clearInterval(flashInterval);
      flashInterval = null;
    }
    document.title = flashOriginalTitle;
    window.removeEventListener("focus", onFocus);
    document.removeEventListener("visibilitychange", onFocus);
  };
  window.addEventListener("focus", onFocus);
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) onFocus();
  });
};

const altradyLink = (symbol, quote = "USDT", market = "spot") => {
  const base = symbol.replace(new RegExp(quote + "$"), "");
  const exchange = market === "futures" ? "BIFU" : "BINA";
  // Altrady format: /dashboard#/trade/EXCHANGE_QUOTE_BASE/
  return `https://app.altrady.com/dashboard#/trade/${exchange}_${quote}_${base}/`;
};

const formatSplitSymbol = (symbol, quote = "USDT") => {
  const base = symbol.replace(new RegExp(quote + "$"), "");
  return `${base}-${quote}`;
};

const buildSphText = (signal) => {
  const exch = signal.market === "futures" ? "BIFU" : "BINA";
  const q = signal.quote || "USDT";
  const sph = signal.sphData;
  const lines = [];
  lines.push(`🚨 SPH: ${exch}: ${signal.base}-${q}`);
  lines.push(
    `Paniek: ${sph.dropPct.toFixed(1)}%. Aantal paniek-candles: ${sph.count}.`
  );
  lines.push(`Tijdstip: ${fmtTime(sph.time)} (${signal.tf}).`);
  lines.push(`Huidige prijs: ${fmtPrice(signal.price)} ${q}.`);
  lines.push(
    `Volume24h (${q}): ${fmtNum(signal.vol24h)}. Change24h: ${signal.change24h.toFixed(2)}%.`
  );
  lines.push(`➡️ Altrady: ${altradyLink(signal.symbol, q, signal.market)}`);
  return lines.join("\n");
};

const buildSignalText = (signal) => {
  const lines = [];
  const dot = signal.side === "long" ? "🟢" : "🔴";
  const verb =
    signal.side === "long" ? "Mogelijk koopmoment." : "Mogelijk verkoop/short-moment.";
  const exch = signal.market === "futures" ? "BIFU" : "BINA";
  const q = signal.quote || "USDT";
  lines.push(`${dot} ${signal.tf} ${exch}: ${formatSplitSymbol(signal.symbol, q)}: ${verb}`);

  // Entry: for long, max = lower BB (or current price); for short, min = upper BB
  if (signal.entryPrice && signal.entryQty) {
    const dir =
      signal.side === "long" ? "Entry maximaal" : "Entry minimaal";
    lines.push(
      `${dir} ${signal.entryQty.toFixed(1)} ${signal.base} / ${signal.entryPrice.toFixed(
        3
      )} ${q}.`
    );
  }
  lines.push(`➡️ Altrady: ${altradyLink(signal.symbol, q, signal.market)}`);
  lines.push(
    `Candle-timestamp: ${signal.candleTime}. Prijs: ${fmtPrice(signal.price)} ${q}.`
  );
  if (signal.expiresAt) {
    const exp = new Date(signal.expiresAt).toLocaleTimeString("nl-NL", {
      hour: "2-digit",
      minute: "2-digit",
    });
    lines.push(`Geldig tot: ${exp}.`);
  }
  lines.push(
    `Volume24h (${q}): ${fmtNum(signal.vol24h)}. Change24h: ${signal.change24h.toFixed(
      2
    )}%. BB-breedte: ${signal.bbWidth.toFixed(1)}%.`
  );
  lines.push(`Stoch (%K / %D): ${Math.round(signal.k)} / ${Math.round(signal.d)}.`);
  lines.push(
    `RSI: ${Math.round(signal.rsi)}. Stoch RSI: ${Math.round(
      signal.stochRsi
    )}. MFI: ${Math.round(signal.mfi)}.`
  );
  lines.push(`📉 Chart-trend: ${signal.chartTrend}.`);
  lines.push(
    `📈 Markttrend voor ${exch}: ${formatSplitSymbol(signal.symbol, q)}: ${signal.marketTrend.toFixed(
      1
    )}% bullish.`
  );
  const wghmIcon = wghmStyle(signal.wghm).emoji;
  lines.push(`${wghmIcon} WGHM: ${signal.wghm}`);
  if (signal.liqBox) {
    lines.push(
      `💧 LiqBox Δ ${signal.liqBox.deltaPct.toFixed(2).replace(".", ",")}% (${fmtTime(signal.liqBox.time)}): High ${fmtPrice(
        signal.liqBox.high
      )}, Low ${fmtPrice(signal.liqBox.low)} (= ${signal.liqBox.rangePct.toFixed(2).replace(".", ",")}%)`
    );
  }
  if (signal.divergence) {
    const d = signal.divergence;
    const icon = d.type === "bullish" ? "🟢🔄" : "🔴🔄";
    const label = d.type === "bullish" ? "Bullish divergentie" : "Bearish divergentie";
    lines.push(
      `${icon} ${label} (${d.candlesAgo} candle${d.candlesAgo !== 1 ? "s" : ""} geleden, RSI ${Math.round(d.prevRsi)} → ${Math.round(d.lastRsi)})`
    );
  }
  lines.push(`Strategie: ${signal.matched.map((h) => h.label).join(", ")}.`);
  return lines.join("\n");
};

function App() {
  const [direction, setDirection] = useState("long"); // long | short
  const [tfs, setTfs] = useState(["5m"]);
  const [pickedStrategy, setPickedStrategy] = useState("stobbnomargin"); // EEN strategie tegelijk

  const [intervalSec, setIntervalSec] = useState(60);
  const [market, setMarket] = useState("spot"); // spot | futures
  const [quote, setQuote] = useState("USDT"); // USDT | USDC
  const [minVol, setMinVol] = useState(1_000_000); // min 24h volume
  const [strongOnly, setStrongOnly] = useState(false);
  const [wghmFilter, setWghmFilter] = useState(false);
  const [marketTrendFilter, setMarketTrendFilter] = useState(false);
  const [divFilter, setDivFilter] = useState(false);
  const [sphMode, setSphMode] = useState(false);
  const [sphThreshold, setSphThreshold] = useState(5); // % minimum daling
  const [sphTf, setSphTf] = useState("1h"); // 1h of 4h
  const [sphLookback, setSphLookback] = useState(24); // aantal candles terug
  const [topN, setTopN] = useState(200);
  const [customSymbols, setCustomSymbols] = useState("");
  const [symbolsMode, setSymbolsMode] = useState("top"); // top | custom
  const [tgToken, setTgToken] = useState("");
  const [tgChatId, setTgChatId] = useState("");
  const [tgTest, setTgTest] = useState({ status: "", msg: "" });
  const [alertSound, setAlertSound] = useState(true);
  const [alertNotif, setAlertNotif] = useState(false);
  const [alertFlash, setAlertFlash] = useState(true);
  const [notifPermission, setNotifPermission] = useState(
    typeof Notification !== "undefined" ? Notification.permission : "unsupported"
  );
  const [signals, setSignals] = useState([]);
  const [scanState, setScanState] = useState({
    status: "idle",
    progress: 0,
    total: 0,
    lastScan: null,
    nextScan: null,
    error: null,
  });
  const [showSettings, setShowSettings] = useState(true);
  const [seenSignals, setSeenSignals] = useState(new Set());

  const cancelRef = useRef(false);
  const timerRef = useRef(null);
  const seenRef = useRef(new Set());

  const activeStrategies = direction === "long" ? LONG_STRATEGIES : SHORT_STRATEGIES;

  // Auto-switch to first strategy of new direction if needed
  useEffect(() => {
    if (!activeStrategies.find((s) => s.id === pickedStrategy)) {
      setPickedStrategy(activeStrategies[0].id);
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [direction]);

  // Build picked-object voor evalStrategies — alleen de gekozen strategie staat aan
  const pickedActive = Object.fromEntries(
    activeStrategies.map((s) => [s.id, s.id === pickedStrategy])
  );
  const hasPick = !!pickedStrategy;

  /* ── Telegram sender ─────────────────────────────────────────────── */
  const sendTelegram = async (text) => {
    if (!tgToken || !tgChatId) return;
    try {
      await fetch(`https://api.telegram.org/bot${tgToken}/sendMessage`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          chat_id: tgChatId,
          text,
          disable_web_page_preview: true,
        }),
      });
    } catch (e) {
      console.error("TG send failed", e);
    }
  };

  /* ── Single scan pass ────────────────────────────────────────────── */
  const runScan = useCallback(async () => {
    cancelRef.current = false;
    setScanState((s) => ({ ...s, status: "scanning", progress: 0, error: null }));

    let symbols = [];
    try {
      if (symbolsMode === "top") {
        symbols = await fetchTopSymbols(market, quote, minVol, topN);
      } else {
        symbols = customSymbols
          .split(/[\s,]+/)
          .map((s) => s.trim().toUpperCase())
          .filter(Boolean);
      }
    } catch (e) {
      setScanState((s) => ({ ...s, status: "error", error: e.message }));
      return;
    }

    // total = symbols × geselecteerde timeframes (in SPH-modus: alleen sphTf)
    const tfList = sphMode ? [sphTf] : (tfs.length > 0 ? tfs : ["5m"]);
    setScanState((s) => ({ ...s, total: symbols.length * tfList.length }));

    let progress = 0;
    for (const tf of tfList) {
      if (cancelRef.current) break;
      for (let i = 0; i < symbols.length; i++) {
        if (cancelRef.current) break;
        const sym = symbols[i];
        try {
          // In SPH-modus genoeg historie ophalen voor lookback
          const limit = sphMode ? Math.max(sphLookback + 5, 100) : 500;
          const data = await fetchKlines(market, sym, tf, limit);

          // ─── SPH-modus: paniek-detectie ─────────────────────────────
          if (sphMode) {
            const sph = detectSPH(data, sphThreshold, sphLookback);
            if (sph) {
              const ticker = await fetch24hrTicker(market, sym);
              const base = sym.replace(new RegExp(quote + "$"), "");
              const sigId = `SPH-${sym}-${tf}-${sph.time}`;
              const signal = {
                id: sigId,
                symbol: sym,
                base,
                quote,
                market,
                tf,
                side: "sph",
                isSph: true,
                sphData: sph,
                candleTime: fmtTime(sph.time),
                price: sph.currentPrice,
                vol24h: ticker ? parseFloat(ticker.quoteVolume) : 0,
                change24h: ticker ? parseFloat(ticker.priceChangePercent) : 0,
                ts: Date.now(),
                expiresAt: (() => {
                  const now = Date.now();
                  const tfMs = tfToMs(tf);
                  let exp = Math.ceil(now / tfMs) * tfMs;
                  if (exp - now < 5000) exp += tfMs;
                  return exp;
                })(),
              };
              if (!seenRef.current.has(sigId)) {
                seenRef.current.add(sigId);
                setSeenSignals((prev) => {
                  const next = new Set(prev);
                  next.add(sigId);
                  return next;
                });
                setSignals((prev) => [signal, ...prev].slice(0, 200));
                sendTelegram(buildSphText(signal));
                if (alertSound) playAlertSound();
                if (alertNotif) {
                  sendBrowserNotif(
                    `🚨 SPH ${base}-${quote}`,
                    `Paniek ${sph.dropPct.toFixed(1)}% (${sph.count} candle${
                      sph.count > 1 ? "s" : ""
                    }) op ${tf}`
                  );
                }
                if (alertFlash && document.hidden) flashTabTitle(1);
              }
            }
            progress++;
            setScanState((s) => ({ ...s, progress }));
            await new Promise((r) => setTimeout(r, 50));
            continue;
          }
          // ─── Einde SPH-modus pad ─────────────────────────────────────
          const result = evalStrategies(data, pickedActive);
          if (result && result.hits && result.hits.length > 0) {
            // Filter by chosen direction
            const dirHits = result.hits.filter((h) => h.side === direction);
            if (dirHits.length > 0) {
              const ticker = await fetch24hrTicker(market, sym);
              const lc = result.metrics.lc;
              const { bb, sto, r, sr, mf } = result.metrics;
              const lastPrice = data.closes[lc];
              const bbWidth =
                ((bb.upper[lc] - bb.lower[lc]) / bb.middle[lc]) * 100;

              // Simple market trend: % of last 20 closes that were green
              const last20 = data.closes.slice(-21, -1);
              const last20o = data.opens.slice(-21, -1);
              const greens = last20.filter((c, idx) => c > last20o[idx]).length;
              const marketTrend = (greens / last20.length) * 100;

              // Chart trend: SMA20 vs price
              const sma20 = sma(data.closes, 20)[lc];
              const chartTrend = lastPrice > sma20 ? "bullish" : "bearish";

              const base = sym.replace(new RegExp(quote + "$"), "");
              const entryPrice =
                direction === "long" ? bb.lower[lc] : bb.upper[lc];
              const budgetUSDT = 845.383;
              const entryQty = budgetUSDT / entryPrice;

              // WGHM + LiqBox + Divergentie
              const wghm = computeWGHM(data, { r, mf });
              const liqBox = computeLiqBox(data);
              const divergence = detectDivergence(data, { r }, 30);

              // ── Sterk-signaal filter ──────────────────────────────
              // Een signaal is "sterk" als minstens 3 van deze 5 condities kloppen:
              // 1. RSI in zone (long: <35, short: >65)
              // 2. MFI in zone (long: <35, short: >65)
              // 3. WGHM bevestigt richting
              // 4. Markttrend in lijn met richting (long: >50, short: <50)
              // 5. BB-breedte minimaal 1.5% (genoeg ruimte om te bewegen)
              const isLongDir = direction === "long";
              const conds = [
                isLongDir ? r[lc] < 35 : r[lc] > 65,
                isLongDir ? mf[lc] < 35 : mf[lc] > 65,
                isLongDir
                  ? wghmStyle(wghm).side === "long"
                  : wghmStyle(wghm).side === "short",
                isLongDir ? marketTrend > 50 : marketTrend < 50,
                bbWidth >= 1.5,
              ];
              const strength = conds.filter(Boolean).length;
              if (strongOnly && strength < 3) {
                progress++;
                setScanState((s) => ({ ...s, progress }));
                await new Promise((r) => setTimeout(r, 50));
                continue;
              }

              // ── WGHM-filter: alleen Mid of High BUY/SELL ──────────
              if (wghmFilter) {
                const wghmOk = isLongDir
                  ? (wghm === "Mid - BUY" || wghm === "High - BUY")
                  : (wghm === "Mid - SELL" || wghm === "High - SELL");
                if (!wghmOk) {
                  progress++;
                  setScanState((s) => ({ ...s, progress }));
                  await new Promise((r) => setTimeout(r, 50));
                  continue;
                }
              }

              // ── Markttrend-filter ─────────────────────────────────
              if (marketTrendFilter) {
                const trendOk = isLongDir ? marketTrend >= 50 : marketTrend <= 50;
                if (!trendOk) {
                  progress++;
                  setScanState((s) => ({ ...s, progress }));
                  await new Promise((r) => setTimeout(r, 50));
                  continue;
                }
              }

              // ── Divergentie-filter ────────────────────────────────
              if (divFilter) {
                const wantType = isLongDir ? "bullish" : "bearish";
                if (!divergence || divergence.type !== wantType) {
                  progress++;
                  setScanState((s) => ({ ...s, progress }));
                  await new Promise((r) => setTimeout(r, 50));
                  continue;
                }
              }

              const signal = {
                id: `${sym}-${tf}-${data.times[lc]}-${dirHits.map((h) => h.id).join(",")}`,
                symbol: sym,
                base,
                quote,
                market,
                tf,
                side: direction,
                divergence,
                candleTime: fmtTime(data.times[lc]),
                price: lastPrice,
                entryPrice,
                entryQty,
                vol24h: ticker ? parseFloat(ticker.quoteVolume) : 0,
                change24h: ticker ? parseFloat(ticker.priceChangePercent) : 0,
                bbWidth,
                k: sto.k[lc],
                d: sto.d[lc],
                rsi: r[lc],
                stochRsi: sr.k[lc],
                mfi: mf[lc],
                chartTrend,
                marketTrend,
                wghm,
                liqBox,
                strength,
                matched: dirHits,
                ts: Date.now(),
                expiresAt: (() => {
                  const now = Date.now();
                  const tfMs = tfToMs(tf);
                  let exp = Math.ceil(now / tfMs) * tfMs;
                  if (exp - now < 5000) exp += tfMs;
                  return exp;
                })(),
              };

              // ── Direct vrijgeven ───────────────────────────────────
              if (!seenRef.current.has(signal.id)) {
                seenRef.current.add(signal.id);
                setSeenSignals((prev) => {
                  const next = new Set(prev);
                  next.add(signal.id);
                  return next;
                });
                setSignals((prev) => [signal, ...prev].slice(0, 200));
                sendTelegram(buildSignalText(signal));
                if (alertSound) playAlertSound();
                if (alertNotif) {
                  const verbShort = isLongDir ? "🟢 Koop" : "🔴 Verkoop";
                  sendBrowserNotif(
                    `${verbShort} ${signal.base}-${signal.quote}`,
                    `${tf} · ${
                      activeStrategies.find((s) => s.id === pickedStrategy)?.label || ""
                    } · prijs ${fmtPrice(signal.price)}`
                  );
                }
                if (alertFlash && document.hidden) flashTabTitle(1);
              }
            }
          }
        } catch (e) {
          // skip individual failures
        }
        progress++;
        setScanState((s) => ({ ...s, progress }));
        // small delay to be polite to Binance
        await new Promise((r) => setTimeout(r, 50));
      }
    }

    setScanState((s) => ({
      ...s,
      status: "idle",
      lastScan: Date.now(),
      nextScan: Date.now() + intervalSec * 1000,

        }

                  <div style={{ fontSize: 13, fontWeight: 600, color: "#1a2922" }}>

                        alert("Je browser ondersteunt geen notificaties.");
                        return;
                      }
                      if (Notification.permission === "denied") {
                        alert(
                          "Notificaties zijn geblokkeerd. Sta ze toe in de instellingen voor deze site."
                        );
                        return;
                      }
                      if (Notification.permission !== "granted") {
                        const result = await Notification.requestPermission();
                        setNotifPermission(result);
                        if (result !== "granted") return;
                      }
                    }
                    setAlertNotif((v) => !v);

                  style={{ display: "none" }}

                      status: "error",
                      msg: "Vul eerst bot-token én chat ID in.",
                    });
                    return;
                  }
                  setTgTest({ status: "sending", msg: "Versturen..." });
                  try {
                    const r = await fetch(
                      `https://api.telegram.org/bot${tgToken}/sendMessage`,
                      {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({
                          chat_id: tgChatId,
                          text:
                            "✅ Test van CC Scanner!\n\nAls je dit ziet, werkt je Telegram-koppeling correct. Je ontvangt vanaf nu signalen wanneer de scanner draait.",
                          disable_web_page_preview: true,
                        }),
                      }
                    );
                    const data = await r.json();
                    if (data.ok) {
                      setTgTest({
                        status: "ok",
                        msg: "✓ Verstuurd! Check je Telegram.",
                      });
                    } else {
                      // Telegram geeft 'description' bij fouten
                      let msg = data.description || "Onbekende fout";
                      if (msg.includes("chat not found")) {
                        msg =
                          "Chat ID klopt niet, of de bot heeft je nog geen bericht gestuurd. Stuur eerst /start naar je bot.";
                      } else if (msg.includes("bot token") || msg.includes("Unauthorized")) {
                        msg = "Bot-token klopt niet. Controleer bij @BotFather.";
                      } else if (msg.includes("blocked")) {
                        msg = "Je hebt de bot geblokkeerd. Open de bot-chat en deblokkeer hem.";
                      }
                      setTgTest({ status: "error", msg: "✗ " + msg });
                    }
                  } catch (e) {
                    setTgTest({
                      status: "error",
                      msg: "✗ Netwerkfout: " + e.message,
                    });
                  }
                }}

                  width: "100%",

                  padding: "10px",

                      ? `linear-gradient(135deg, ${accent} 0%, ${accentDark} 100%)`

                  borderRadius: 12,
                  fontFamily: "inherit",

                  style={{
                    marginTop: 8,
                    padding: "8px 10px",
                    borderRadius: 10,
                    fontSize: 12,
                    fontWeight: 500,
                    background:
                      tgTest.status === "ok"
                        ? "#dcfce7"
                        : tgTest.status === "error"
                        ? "#fee2e2"
                        : "rgba(255,255,255,0.7)",
                    color:
                      tgTest.status === "ok"
                        ? "#15803d"
                        : tgTest.status === "error"
                        ? "#b91c1c"
                        : "#3a4a42",
                  }}
                >
                  {tgTest.msg}
                </div>
              )}
              <div style={{ fontSize: 10, color: "#5a6b62", marginTop: 8 }}>
                Beide invullen → signalen worden doorgestuurd. <br />
                <strong>Belangrijk:</strong> stuur eerst <code>/start</code> naar je eigen bot in Telegram, anders mag de bot je geen berichten sturen.
              </div>
            </Section>
          </div>
        )}

        {/* Run button */}
        <button
          onClick={() => setScanning((s) => !s)}
          disabled={!hasPick}
          style={{
            width: "100%",
            marginTop: 12,
            padding: "18px",
            background: scanning
              ? "#fdf9ed"
              : !hasPick
              ? "rgba(253, 249, 237, 0.55)"
              : `linear-gradient(135deg, ${accent} 0%, ${accentDark} 100%)`,
            color: scanning ? accent : !hasPick ? "#7a8a82" : "#fff",
            border: "none",
            borderRadius: 18,
            fontFamily: "inherit",
            fontSize: 16,
            fontWeight: 700,
            letterSpacing: 0.2,
            cursor: !hasPick ? "not-allowed" : "pointer",
            display: "flex",
            alignItems: "center",
            justifyContent: "center",
            gap: 8,
            minHeight: 56,
            boxShadow: scanning
              ? "0 2px 10px rgba(0,0,0,0.10)"

              ? "0 2px 10px rgba(0,0,0,0.06)"
              : `0 6px 18px ${accent}50`,
          }}
        >
          {scanning ? (
            <>
              <Pause size={16} /> Stop scannen
            </>
          ) : (
            <>
              <Play size={16} fill="currentColor" />
              {!hasPick
                ? "Kies eerst een strategie"

                ? `Start SPH-paniek scan · ${sphTf} / ${sphThreshold}%`
                : `Start scan · ${activeStrategies.find((s) => s.id === pickedStrategy)?.label || ""}`}
            </>
          )}
        </button>

        {/* Status */}
        <StatusBar state={scanState} accent={accent} scanning={scanning} />
      </div>

      {/* Signals */}
      <div style={{ padding: "0 12px" }}>
        <div
          style={{
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            padding: "12px 6px 4px",
            marginTop: 6,
          }}

          <div
            style={{
              fontSize: 11,
              color: "rgba(255,255,255,0.85)",

              textShadow: "0 1px 2px rgba(0,0,0,0.15)",

            <button
              onClick={() => {

                background: "rgba(253, 249, 237, 0.7)",

                color: "#3a4a42",
                fontFamily: "inherit",
                fontSize: 11,
                cursor: "pointer",
                display: "flex",
                alignItems: "center",
                gap: 4,
                padding: "4px 10px",
                borderRadius: 12,
                fontWeight: 600,

            >
              <Trash2 size={11} /> Wis

          )}
        </div>

        {signals.length === 0 ? (
          <div
            style={{
              padding: "40px 20px",
              textAlign: "center",
              color: "rgba(255,255,255,0.85)",
              fontSize: 13,
              textShadow: "0 1px 2px rgba(0,0,0,0.1)",
            }}
          >
            <Activity size={28} style={{ opacity: 0.6, marginBottom: 10 }} />
            <div>Nog geen signalen.</div>
            <div style={{ fontSize: 11, marginTop: 4, opacity: 0.85 }}>

        ) : (
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
            {signals.map((s) => (
              <SignalCard key={s.id} s={s} />
            ))}
          </div>
        )}
      </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════════════════════════════
   SUB-COMPONENTS
   ═══════════════════════════════════════════════════════════════════════════ */

const inputStyle = {
  width: "100%",
  background: "rgba(255,255,255,0.7)",
  color: "#1a2922",
  border: "none",
  borderRadius: 12,
  padding: "10px 12px",
  fontFamily: "inherit",
  fontSize: 12,
  boxSizing: "border-box",
  outline: "none",
};

function Section({ title, children }) {
  return (
    <div
      style={{
        background: "rgba(253, 249, 237, 0.92)",
        borderRadius: 16,
        padding: "10px 12px",
        boxShadow: "0 2px 8px rgba(0,0,0,0.08)",
      }}
    >
      <div
        style={{
          fontSize: 11,
          color: "#3a4a42",
          fontWeight: 700,
          marginBottom: 8,
        }}
      >
        {title}
      </div>
      {children}
    </div>
  );
}

function StatusBar({ state, accent, scanning }) {
  const pct = state.total > 0 ? (state.progress / state.total) * 100 : 0;
  return (
    <div
      style={{
        marginTop: 10,
        padding: "10px 14px",
        background: "rgba(253, 249, 237, 0.85)",
        borderRadius: 14,
        boxShadow: "0 1px 6px rgba(0,0,0,0.06)",
      }}
    >
      <div
        style={{
          height: 3,
          background: "rgba(0,0,0,0.08)",
          borderRadius: 2,
          overflow: "hidden",
        }}
      >
        {state.status === "scanning" ? (
          <div
            className="scanning-bar"
            style={{
              height: "100%",
              width: `${Math.max(pct, 8)}%`,
              borderRadius: 2,
            }}
          />
        ) : (
          <div
            style={{
              height: "100%",
              width: state.lastScan ? "100%" : "0%",
              background: accent,
              opacity: 0.6,
              borderRadius: 2,
            }}
          />
        )}
      </div>
      <div
        style={{
          display: "flex",
          justifyContent: "space-between",
          fontSize: 11,
          color: "#3a4a42",
          marginTop: 6,
          fontWeight: 500,
        }}
      >
        <span>
          {state.status === "scanning"
            ? `Scannen ${state.progress}/${state.total}`
            : state.error
            ? `⚠ ${state.error}`
            : state.lastScan
            ? `Laatste: ${new Date(state.lastScan).toLocaleTimeString("nl-NL")}`
            : "Geen scan uitgevoerd"}
        </span>
        {scanning && state.status !== "scanning" && state.nextScan && (
          <CountDown to={state.nextScan} />
        )}
      </div>
    </div>
  );
}

function CountDown({ to }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const sec = Math.max(0, Math.floor((to - now) / 1000));
  return <span>Volgende over {sec}s</span>;
}

function ValidityBadge({ expiresAt }) {
  const [now, setNow] = useState(Date.now());
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);
  const ms = expiresAt - now;
  const expired = ms <= 0;
  const totalSec = Math.max(0, Math.floor(ms / 1000));
  const m = Math.floor(totalSec / 60);
  const s = totalSec % 60;
  const totalDuration = expiresAt - (expiresAt - 5 * 60 * 1000); // niet exact maar ok
  // Kleur op basis van resterende seconden
  let bg, fg;
  if (expired) { bg = "#d4d4d4"; fg = "#666"; }
  else if (totalSec > 60) { bg = "#dcfce7"; fg = "#15803d"; }
  else if (totalSec > 20) { bg = "#fef3c7"; fg = "#a16207"; }
  else { bg = "#fee2e2"; fg = "#b91c1c"; }

  const label = expired
    ? "verlopen"
    : `${m > 0 ? m + "m " : ""}${s}s geldig`;

  return (
    <span
      style={{
        background: bg,
        color: fg,
        fontSize: 11,
        fontWeight: 600,
        padding: "2px 8px",
        borderRadius: 10,
        marginLeft: 6,
        whiteSpace: "nowrap",
      }}
    >
      ⏱ {label}
    </span>
  );
}

function SignalCard({ s }) {
  const isLong = s.side === "long";
  const isSph = s.isSph;
  const dot = isSph ? "🚨" : isLong ? "🟢" : "🔴";
  const verb = isSph
    ? "SPH-paniek"
    : isLong
    ? "Mogelijk koopmoment"
    : "Mogelijk verkoop/short-moment";
  const [, force] = useState(0);
  // Force re-render every 5s to fade expired cards
  useEffect(() => {
    const t = setInterval(() => force((x) => x + 1), 5000);
    return () => clearInterval(t);
  }, []);
  const expired = s.expiresAt && Date.now() > s.expiresAt;

  // ─── SPH-kaart: korte, lijst-achtige weergave ───────────────────────
  if (isSph) {
    return (
      <div
        style={{
          background: expired ? "#f5f0e8" : "#fff4ed",
          borderRadius: 18,
          borderTopLeftRadius: 4,
          padding: "12px 14px",
          color: expired ? "#7a7a7a" : "#1a1a1a",
          fontSize: 14,
          lineHeight: 1.45,
          boxShadow: "0 2px 10px rgba(0,0,0,0.10)",
          borderLeft: `4px solid ${expired ? "#d4a895" : "#ea580c"}`,
          maxWidth: "100%",
          opacity: expired ? 0.65 : 1,
          transition: "opacity 0.4s, background 0.4s, color 0.4s",
        }}
      >
        <div style={{ display: "flex", alignItems: "center", flexWrap: "wrap", marginBottom: 4 }}>
          <span style={{ marginRight: 4 }}>{dot}</span>
          <strong>
            SPH · {s.tf} {s.market === "futures" ? "BIFU" : "BINA"}: {s.base}-{s.quote || "USDT"}
          </strong>
          {s.expiresAt && <ValidityBadge expiresAt={s.expiresAt} />}
        </div>
        <div>
          Paniek: <strong>{s.sphData.dropPct.toFixed(1)}%</strong>. Aantal paniek-candles:{" "}
          <strong>{s.sphData.count}</strong>.
        </div>
        <div>
          Tijdstip: {fmtTime(s.sphData.time)}.
        </div>
        <div>
          Huidige prijs: <strong>{fmtPrice(s.price)}</strong> {s.quote || "USDT"}.
        </div>
        <div>
          Volume24h ({s.quote || "USDT"}): {fmtNum(s.vol24h)}. Change24h:{" "}
          {s.change24h.toFixed(2)}%.
        </div>
        <a
          href={altradyLink(s.symbol, s.quote || "USDT", s.market)}
          target="_blank"
          rel="noreferrer"
          style={{
            color: "#1d6ed8",
            textDecoration: "none",
            fontWeight: 500,
            display: "inline-block",
            marginTop: 4,
          }}
        >
          ➡ Altrady
        </a>
        <div
          style={{
            fontSize: 11,
            color: "#7a8a82",
            marginTop: 4,
            textAlign: "right",
            fontWeight: 500,
          }}
        >
          {new Date(s.ts).toLocaleTimeString("nl-NL", {
            hour: "2-digit",
            minute: "2-digit",
          })}
        </div>
      </div>
    );
  }
  // ─── Einde SPH-kaart ────────────────────────────────────────────────

  return (
    <div
      style={{
        background: expired ? "#f0eee5" : "#fdf9ed",
        borderRadius: 18,
        borderTopLeftRadius: 4,
        padding: "12px 14px",
        color: expired ? "#7a7a7a" : "#1a1a1a",
        fontSize: 14,
        lineHeight: 1.45,
        boxShadow: "0 2px 10px rgba(0,0,0,0.10)",
        position: "relative",
        maxWidth: "100%",
        opacity: expired ? 0.65 : 1,
        transition: "opacity 0.4s, background 0.4s, color 0.4s",
      }}
    >
      <div style={{ marginBottom: 4, display: "flex", alignItems: "center", flexWrap: "wrap" }}>
        <span style={{ marginRight: 4 }}>{dot}</span>
        <strong>
          {s.tf} {s.market === "futures" ? "BIFU" : "BINA"}: {s.base}-{s.quote || "USDT"}
        </strong>
        <span>: {verb}.</span>
        {s.expiresAt && <ValidityBadge expiresAt={s.expiresAt} />}
      </div>
      <div>
        Entry {isLong ? "maximaal" : "minimaal"}{" "}
        <strong>{s.entryQty.toFixed(1)}</strong> {s.base} /{" "}
        <strong>{s.entryPrice.toFixed(3)}</strong> {s.quote || "USDT"}.
      </div>
      <a
        href={altradyLink(s.symbol, s.quote || "USDT", s.market)}
        target="_blank"
        rel="noreferrer"
        style={{
          color: "#1d6ed8",
          textDecoration: "none",
          fontWeight: 500,
          display: "inline-flex",
          alignItems: "center",
          gap: 4,
          marginTop: 1,
          marginBottom: 2,
        }}
      >
        ➡ Altrady
      </a>
      <div>
        Candle-timestamp: {s.candleTime}. Prijs:{" "}
        <strong>{fmtPrice(s.price)}</strong> {s.quote || "USDT"}.
      </div>
      {s.expiresAt && (
        <div>
          Geldig tot:{" "}
          <strong>
            {new Date(s.expiresAt).toLocaleTimeString("nl-NL", {
              hour: "2-digit",
              minute: "2-digit",
            })}
          </strong>
          .
        </div>
      )}
      <div>
        Volume24h ({s.quote || "USDT"}): {fmtNum(s.vol24h)}. Change24h:{" "}
        {s.change24h.toFixed(2)}%. BB-breedte: {s.bbWidth.toFixed(1)}%.
      </div>
      <div>
        Stoch (%K / %D): {Math.round(s.k)} / {Math.round(s.d)}.
      </div>
      <div>
        RSI: {Math.round(s.rsi)}. Stoch RSI: {Math.round(s.stochRsi)}. MFI:{" "}
        {Math.round(s.mfi)}.
      </div>
      <div>
        📉 Chart-trend: {s.chartTrend}.
      </div>
      <div>
        📈 Markttrend voor {s.market === "futures" ? "BIFU" : "BINA"}: {s.base}-{s.quote || "USDT"}: {s.marketTrend.toFixed(1)}%
        bullish.
      </div>
      <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
        <span
          style={{
            display: "inline-block",
            width: 14,
            height: 14,
            borderRadius: 3,
            background: wghmStyle(s.wghm).color,
            border: "1px solid rgba(0,0,0,0.15)",
            flexShrink: 0,
          }}
        />
        <span>WGHM: {s.wghm}</span>
      </div>
      {s.liqBox && (
        <div>
          💧 LiqBox Δ {s.liqBox.deltaPct.toFixed(2).replace(".", ",")}%
          {" "}({fmtTime(s.liqBox.time)}): High {fmtPrice(s.liqBox.high)}, Low{" "}
          {fmtPrice(s.liqBox.low)} (= {s.liqBox.rangePct.toFixed(2).replace(".", ",")}
          %)
        </div>
      )}
      {s.divergence && (
        <div
          style={{
            marginTop: 2,
            padding: "4px 8px",
            background:
              s.divergence.type === "bullish"
                ? "rgba(34, 197, 94, 0.12)"
                : "rgba(220, 38, 38, 0.12)",
            color:
              s.divergence.type === "bullish" ? "#15803d" : "#b91c1c",
            borderRadius: 8,
            fontSize: 12,
            fontWeight: 500,
            display: "inline-block",
          }}
        >
          {s.divergence.type === "bullish" ? "🟢 🔄 Bullish" : "🔴 🔄 Bearish"} divergentie · {s.divergence.candlesAgo}{" "}
          candle{s.divergence.candlesAgo !== 1 ? "s" : ""} geleden · RSI{" "}
          {Math.round(s.divergence.prevRsi)} → {Math.round(s.divergence.lastRsi)}
        </div>
      )}
      <div
        style={{
          marginTop: 6,
          fontSize: 11,
          color: "#5a6b62",
          fontStyle: "italic",
        }}
      >
        {s.matched.map((h) => h.label).join(" · ")}
      </div>
      <div
        style={{
          fontSize: 11,
          color: "#7a8a82",
          marginTop: 4,
          textAlign: "right",
          fontWeight: 500,
        }}
      >
        {new Date(s.ts).toLocaleTimeString("nl-NL", {
          hour: "2-digit",
          minute: "2-digit",
        })}
      </div>
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>

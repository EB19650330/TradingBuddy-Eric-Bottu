// ============================================================
// API
// ============================================================
async function fetchKlines(symbol, interval, market, limit = 120) {
  const base = market === 'futures' ? BINANCE_FUTURES : BINANCE_SPOT;
  const r = await fetch(`${base}/klines?symbol=${symbol}&interval=${interval}&limit=${limit}`);
  if (!r.ok) throw new Error('klines fail');
  const data = await r.json();
  return data.map(c => ({
    time: c[0],
    open: parseFloat(c[1]),
    high: parseFloat(c[2]),
    low:  parseFloat(c[3]),
    close:parseFloat(c[4]),
    volume: parseFloat(c[5]),
  }));
}

async function fetchTopPairs(market, limit = 25) {
  const base = market === 'futures' ? BINANCE_FUTURES : BINANCE_SPOT;
  const r = await fetch(`${base}/ticker/24hr`);
  if (!r.ok) throw new Error('ticker fail');
  const data = await r.json();
  return data
    .filter(t => t.symbol.endsWith('USDT') && !t.symbol.includes('_') && !t.symbol.startsWith('USDC'))
    .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
    .slice(0, limit)
    .map(t => ({
      symbol: t.symbol,
      price: parseFloat(t.lastPrice),
      change: parseFloat(t.priceChangePercent),
      volume: parseFloat(t.quoteVolume),
    }));
}

async function fetchFearGreed() {
  try {
    const r = await fetch('https://api.alternative.me/fng/?limit=1');
    const d = await r.json();
    return parseInt(d.data[0].value, 10);
  } catch { return null; }
}

// ============================================================
// SIGNAL DETECTION
// ============================================================
function detectFVG(candles) {
  const out = [];
  for (let i = 2; i < candles.length; i++) {
    const a = candles[i - 2], b = candles[i - 1], c = candles[i];
    const body = Math.abs(b.close - b.open);
    const range = b.high - b.low;
    if (body < range * 0.5) continue;
    if (a.high < c.low) {
      const gap = ((c.low - a.high) / a.high) * 100;
      if (gap > 0.15)
        out.push({ type: 'FVG', direction: 'LONG', entry: c.low,
                   zoneTop: c.low, zoneBottom: a.high, index: i,
                   time: c.time, strength: Math.min(100, gap * 12) });
    }
    if (a.low > c.high) {
      const gap = ((a.low - c.high) / c.high) * 100;
      if (gap > 0.15)
        out.push({ type: 'FVG', direction: 'SHORT', entry: c.high,
                   zoneTop: a.low, zoneBottom: c.high, index: i,
                   time: c.time, strength: Math.min(100, gap * 12) });
    }
  }
  return out;
}

function detectOB(candles) {
  const out = [];
  for (let i = 1; i < candles.length; i++) {
    const prev = candles[i - 1], curr = candles[i];
    const move = ((curr.close - curr.open) / curr.open) * 100;
    const body = Math.abs(curr.close - curr.open);
    const range = curr.high - curr.low;
    if (body < range * 0.6) continue;
    if (move > 1.5 && prev.close < prev.open) {
      out.push({ type: 'OB', direction: 'LONG', entry: prev.high,
                 zoneTop: prev.high, zoneBottom: prev.low, index: i - 1,
                 time: prev.time, strength: Math.min(100, move * 25) });
    }
    if (move < -1.5 && prev.close > prev.open) {
      out.push({ type: 'OB', direction: 'SHORT', entry: prev.low,
                 zoneTop: prev.high, zoneBottom: prev.low, index: i - 1,
                 time: prev.time, strength: Math.min(100, Math.abs(move) * 25) });
    }
  }
  return out;
}

function detectBOSS(candles) {
  const out = [];
  const win = 20;
  if (candles.length < win + 2) return out;
  for (let i = win; i < candles.length; i++) {
    const w = candles.slice(i - win, i);
    const hi = Math.max(...w.map(c => c.high));
    const lo = Math.min(...w.map(c => c.low));
    const c = candles[i];
    if (c.close > hi)
      out.push({ type: 'BOSS', direction: 'LONG', entry: hi,
                 index: i, time: c.time,
                 strength: Math.min(100, ((c.close - hi) / hi) * 200 + 50) });
    if (c.close < lo)
      out.push({ type: 'BOSS', direction: 'SHORT', entry: lo,
                 index: i, time: c.time,
                 strength: Math.min(100, ((lo - c.close) / lo) * 200 + 50) });
  }
  return out;
}

function detectFIB(candles) {
  const out = [];
  const win = Math.min(60, candles.length);
  if (win < 20) return out;
  const w = candles.slice(-win);
  let hiI = 0, loI = 0;
  for (let i = 0; i < w.length; i++) {
    if (w[i].high > w[hiI].high) hiI = i;
    if (w[i].low  < w[loI].low ) loI = i;
  }
  const hi = w[hiI].high, lo = w[loI].low;
  const last = candles[candles.length - 1];
  const range = hi - lo;
  if (range / lo < 0.02) return out;
  const fibs = [0.382, 0.5, 0.618, 0.786];
  if (hiI > loI) {
    for (const f of fibs) {
      const lvl = hi - range * f;
      const dist = Math.abs(last.close - lvl) / last.close * 100;
      if (dist < 1.2) {
        out.push({ type: 'FIB', direction: 'LONG', entry: lvl,
                   index: candles.length - 1, time: last.time,
                   strength: Math.max(40, 100 - dist * 40), fibLevel: f });
        break;
      }
    }
  } else {
    for (const f of fibs) {
      const lvl = lo + range * f;
      const dist = Math.abs(last.close - lvl) / last.close * 100;
      if (dist < 1.2) {
        out.push({ type: 'FIB', direction: 'SHORT', entry: lvl,
                   index: candles.length - 1, time: last.time,
                   strength: Math.max(40, 100 - dist * 40), fibLevel: f });
        break;
      }
    }
  }
  return out;
}

function computeRSI(candles, period = 14) {
  if (candles.length < period + 1) return 50;
  let gains = 0, losses = 0;
  for (let i = candles.length - period; i < candles.length; i++) {
    const d = candles[i].close - candles[i - 1].close;
    if (d > 0) gains += d; else losses -= d;
  }
  const rs = gains / (losses || 1);
  return 100 - 100 / (1 + rs);
}

async function scanSymbol(symbol, interval, market) {
  const candles = await fetchKlines(symbol, interval, market, 120);
  if (!candles || candles.length < 25) return [];
  const all = [
    ...detectFVG(candles),
    ...detectOB(candles),
    ...detectBOSS(candles),
    ...detectFIB(candles),
  ];
  const last = candles[candles.length - 1];
  const recent = all.filter(s => s.index === undefined || s.index >= candles.length - 15);
  return recent.map(s => ({
    ...s,
    id: `${symbol}-${interval}-${market}-${s.type}-${s.direction}-${s.time}`,
    symbol, interval, market,
    currentPrice: last.close,
    distance: ((last.close - s.entry) / s.entry * 100),
    candles,
    rsi: computeRSI(candles),
  }));
}

const fmtPrice = (p) => {
  if (p == null || isNaN(p)) return '—';
  if (p >= 1000) return p.toLocaleString('nl-NL', { maximumFractionDigits: 2 });
  if (p >= 1)    return p.toFixed(3);
  if (p >= 0.01) return p.toFixed(4);
  return p.toFixed(6);
};
const fmtPct = (p) => (p >= 0 ? '+' : '') + p.toFixed(2) + '%';
const fmtTime = (t) => {
  const d = new Date(t);
  return d.toLocaleString('nl-NL', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });
};

// ============================================================
// CHART
// ============================================================
function CandlestickChart({ candles, signal, height = 220, showZones = true }) {
  const [hover, setHover] = useState(null);
  if (!candles || candles.length === 0) return null;
  const slice = candles.slice(-60);
  const w = 800, padL = 8, padR = 70, padT = 10, padB = 22;
  const chartW = w - padL - padR;
  const chartH = height - padT - padB;
  const lo = Math.min(...slice.map(c => c.low));
  const hi = Math.max(...slice.map(c => c.high));
  const pad = (hi - lo) * 0.08;
  const yMin = lo - pad, yMax = hi + pad;
  const yScale = (v) => padT + (1 - (v - yMin) / (yMax - yMin)) * chartH;
  const candleW = chartW / slice.length;
  const bodyW = Math.max(1.5, candleW * 0.7);
  const gridLines = [];
  for (let i = 0; i <= 4; i++) {
    const v = yMin + (yMax - yMin) * (i / 4);
    gridLines.push({ y: yScale(v), v });
  }

  return (
    <div style={{ position: 'relative', width: '100%' }}>
      <svg viewBox={`0 0 ${w} ${height}`} style={{ width: '100%', height: 'auto', display: 'block' }}>
        {gridLines.map((g, i) => (
          <g key={i}>
            <line x1={padL} x2={w - padR} y1={g.y} y2={g.y} stroke="rgba(255,255,255,0.05)" strokeDasharray="2 4" />
            <text x={w - padR + 6} y={g.y + 3} fill="rgba(255,255,255,0.4)" fontSize="9" fontFamily="ui-monospace, monospace">
              {fmtPrice(g.v)}
            </text>
          </g>
        ))}
        {showZones && signal && (signal.zoneTop || signal.entry) && (
          <>
            {signal.zoneTop && signal.zoneBottom && (
              <rect
                x={padL}
                y={yScale(signal.zoneTop)}
                width={chartW}
                height={Math.abs(yScale(signal.zoneBottom) - yScale(signal.zoneTop))}
                fill={signal.direction === 'LONG' ? 'rgba(16,185,129,0.12)' : 'rgba(239,68,68,0.12)'}
                stroke={signal.direction === 'LONG' ? 'rgba(16,185,129,0.4)' : 'rgba(239,68,68,0.4)'}
                strokeDasharray="3 3"
              />
            )}
            <line
              x1={padL} x2={w - padR}
              y1={yScale(signal.entry)} y2={yScale(signal.entry)}
              stroke={signal.direction === 'LONG' ? '#10b981' : '#ef4444'}
              strokeWidth="1" strokeDasharray="4 3"
            />
            <text
              x={w - padR - 4} y={yScale(signal.entry) - 3}
              fill={signal.direction === 'LONG' ? '#10b981' : '#ef4444'}
              fontSize="10" textAnchor="end" fontWeight="600"
            >
              {signal.type} {signal.direction}
            </text>
          </>
        )}
        {slice.map((c, i) => {
          const x = padL + i * candleW + candleW / 2;
          const up = c.close >= c.open;
          const color = up ? '#22c55e' : '#ef4444';
          return (
            <g key={i} onMouseEnter={() => setHover(c)} onMouseLeave={() => setHover(null)}>
              <line x1={x} x2={x} y1={yScale(c.high)} y2={yScale(c.low)} stroke={color} strokeWidth="1" />
              <rect
                x={x - bodyW / 2}
                y={yScale(Math.max(c.open, c.close))}
                width={bodyW}
                height={Math.max(1, Math.abs(yScale(c.open) - yScale(c.close)))}
                fill={color}
              />
            </g>
          );
        })}
      </svg>
      {hover && (
        <div style={{
          position: 'absolute', top: 6, left: 8, padding: '4px 8px',

function SignalDetail({ signal, onClose }) {
  const meta = SIGNAL_META[signal.type];

  let stop, tp1, tp2, tp3, riskPct;
  if (signal.direction === 'LONG') {
    stop = signal.zoneBottom ?? (signal.entry * 0.99);
    riskPct = (signal.entry - stop) / signal.entry * 100;
    tp1 = signal.entry + (signal.entry - stop) * 1;
    tp2 = signal.entry + (signal.entry - stop) * 2;
    tp3 = signal.entry + (signal.entry - stop) * 3;

function TradingBuddyEB() {
  const [nav, setNav] = useState('signalen');
  const [leftCollapsed, setLeftCollapsed] = useState(false);
  const [rightCollapsed, setRightCollapsed] = useState(true);
  const [mobileLeftOpen, setMobileLeftOpen] = useState(false);

  const [signals, setSignals] = useState([]);
  const [pairs, setPairs] = useState([]);
  const [loading, setLoading] = useState(false);
  const [progress, setProgress] = useState({ done: 0, total: 0 });
  const [error, setError] = useState(null);
  const [lastUpdate, setLastUpdate] = useState(null);

  const [fearGreed, setFearGreed] = useState(null);
  const [btcChange24h, setBtcChange24h] = useState(0);

  const [enabledTypes, setEnabledTypes] = useState({ FVG: true, OB: true, BOSS: true, FIB: true });
  const [direction, setDirection] = useState('BOTH');
  const [timeframes, setTimeframes] = useState({ '15m': false, '1h': true, '4h': true });
  const [enabledMarkets, setEnabledMarkets] = useState({ spot: true, futures: true });
  const [maxPairs, setMaxPairs] = useState(50);
  const [search, setSearch] = useState('');
  const [minRating, setMinRating] = useState(0);
  const [sortBy, setSortBy] = useState('newest');
  const [showSortMenu, setShowSortMenu] = useState(false);
  const [selectedSignal, setSelectedSignal] = useState(null);

  // Auto-scan timer (in seconds, 0 = off)
  const [autoScan, setAutoScan] = useState(0);
  const autoScanRef = useRef(null);

  const scan = useCallback(async () => {
    setLoading(true);
    setError(null);
    try {
      const activeMarkets = Object.entries(enabledMarkets).filter(([_, v]) => v).map(([k]) => k);
      const activeTfs = Object.entries(timeframes).filter(([_, v]) => v).map(([k]) => k);
      if (activeMarkets.length === 0 || activeTfs.length === 0) {
        setSignals([]); setLoading(false); return;
      }
      const pairLists = await Promise.all(
        activeMarkets.map(m => fetchTopPairs(m, maxPairs).then(p => ({ market: m, pairs: p })))
      );
      const allPairs = pairLists.flatMap(pl => pl.pairs.map(p => ({ ...p, market: pl.market })));
      setPairs(allPairs);
      const btc = allPairs.find(p => p.symbol === 'BTCUSDT');
      if (btc) setBtcChange24h(btc.change);

      const tasks = [];
      for (const { market, pairs } of pairLists) {
        for (const p of pairs) {
          for (const tf of activeTfs) tasks.push({ symbol: p.symbol, interval: tf, market });
        }
      }
      setProgress({ done: 0, total: tasks.length });

      const found = [];
      // Lower concurrency for larger scans to avoid rate limits
      const CONC = tasks.length > 300 ? 4 : tasks.length > 150 ? 6 : 8;
      let idx = 0;
      const runNext = async () => {
        while (idx < tasks.length) {
          const my = idx++;
          const t = tasks[my];
          try {
            const sigs = await scanSymbol(t.symbol, t.interval, t.market);
            found.push(...sigs);
          } catch {}
          setProgress({ done: my + 1, total: tasks.length });
        }
      };
      await Promise.all(Array.from({ length: CONC }, runNext));
      setSignals(found);
      setLastUpdate(new Date());
    } catch (e) {
      setError(e.message || 'Onbekende fout bij scannen');
    } finally {
      setLoading(false);
    }
  }, [enabledMarkets, timeframes, maxPairs]);

  // Initial load
  useEffect(() => {
    fetchFearGreed().then(setFearGreed);
    scan();
  }, []);

  // Auto-scan
  useEffect(() => {
    if (autoScanRef.current) clearInterval(autoScanRef.current);
    if (autoScan > 0) {
      autoScanRef.current = setInterval(() => {
        if (!loading) scan();
      }, autoScan * 1000);
    }
    return () => { if (autoScanRef.current) clearInterval(autoScanRef.current); };
  }, [autoScan, scan, loading]);

  const filteredSignals = useMemo(() => {
    let f = signals.filter(s => {
      if (!enabledTypes[s.type]) return false;
      if (direction !== 'BOTH' && s.direction !== direction) return false;
      if (search && !s.symbol.toLowerCase().includes(search.toLowerCase())) return false;
      if (s.strength < minRating) return false;
      return true;
    });
    switch (sortBy) {
      case 'newest':   f.sort((a, b) => b.time - a.time); break;
      case 'oldest':   f.sort((a, b) => a.time - b.time); break;
      case 'rating':   f.sort((a, b) => b.strength - a.strength); break;
      case 'distance': f.sort((a, b) => Math.abs(a.distance) - Math.abs(b.distance)); break;
      case 'volume': {
        const vmap = Object.fromEntries(pairs.map(p => [p.symbol + ':' + p.market, p.volume]));
        f.sort((a, b) => (vmap[b.symbol + ':' + b.market] || 0) - (vmap[a.symbol + ':' + a.market] || 0));
        break;
      }
    }
    return f;
  }, [signals, enabledTypes, direction, search, minRating, sortBy, pairs]);

  const counts = useMemo(() => {
    const c = { FVG: 0, OB: 0, BOSS: 0, FIB: 0 };
    for (const s of signals) c[s.type]++;
    return c;
  }, [signals]);

  const dayBias = btcChange24h >= 0 ? 'LONG' : 'SHORT';

    { id: 'levels',   icon: 'pin',      label: 'Levels'       },
    { id: 'kalender', icon: 'calendar', label: 'Kalender'     },
  ];

  // Rate limit warning for high pair counts
  const totalCalls = maxPairs * Object.values(enabledMarkets).filter(Boolean).length * Object.values(timeframes).filter(Boolean).length;
  const rateLimitWarn = totalCalls > 400;

                <button onClick={() => setMobileLeftOpen(false)}
                  style={{ background: 'none', border: 'none', color: '#fff' }}>
                  <Icon name="x" size={20} />
                </button>
              </div>
              {NAV_ITEMS.map(it => (
                <SidebarItem key={it.id} icon={it.icon} label={it.label}
                  active={nav === it.id}
                  onClick={() => { setNav(it.id); setMobileLeftOpen(false); }} />
              ))}
            </aside>
          </div>
        )}

        {/* MAIN */}
        <main style={{ flex: 1, padding: '16px 18px', minWidth: 0, overflowX: 'hidden' }}>
          {/* STATUS BAR */}
          <div style={{ display: 'flex', gap: 10, marginBottom: 14, flexWrap: 'wrap', alignItems: 'center' }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
              <Icon name="activity" size={20} color="#a78bfa" />
              <span style={{ fontSize: 22, fontWeight: 700, letterSpacing: -0.3 }}>
                {NAV_ITEMS.find(n => n.id === nav)?.label || 'Signalen'}
              </span>
            </div>
            <StatCard label="BAROMETER" value="" accent="rgba(139,92,246,0.25)">
              <div style={{ display: 'flex', gap: 5, marginTop: 4 }}>
                {[0,1,2,3,4].map(i => (
                  <div key={i} style={{
                    width: 9, height: 9, borderRadius: '50%',
                    background: i < barometer ? '#22c55e' : 'rgba(255,255,255,0.2)'
                  }} />
                ))}
              </div>
            </StatCard>
            <StatCard label="FEAR/GREED"
              value={fearGreed != null ? fearGreed : '—'}
              valueColor={fearGreed == null ? '#fff' : fearGreed < 25 ? '#ef4444' : fearGreed < 50 ? '#f59e0b' : fearGreed < 75 ? '#22c55e' : '#10b981'}
              accent="rgba(245,158,11,0.3)" info />
            <StatCard label="BTC 24u"
              value={fmtPct(btcChange24h)}
              valueColor={btcChange24h >= 0 ? '#22c55e' : '#ef4444'}
              accent="rgba(245,158,11,0.3)" info />
            <StatCard label="DAY BIAS"
              value={dayBias}
              valueColor={dayBias === 'LONG' ? '#22c55e' : '#ef4444'}
              accent={dayBias === 'LONG' ? 'rgba(34,197,94,0.3)' : 'rgba(239,68,68,0.3)'} info>
              <div style={{ marginTop: 4, height: 4, background: 'rgba(255,255,255,0.1)', borderRadius: 2, overflow: 'hidden' }}>
                <div style={{ width: dayBiasPct + '%', height: '100%', background: dayBias === 'LONG' ? '#22c55e' : '#ef4444' }} />
              </div>
            </StatCard>
            <StatCard label="SCAN STATUS"
              value={loading ? `${Math.round(progress.done/Math.max(1,progress.total)*100)}%` : 'OK'}
              valueColor={loading ? '#f59e0b' : '#10b981'}
              accent="rgba(16,185,129,0.3)">
              <div style={{ color: 'rgba(255,255,255,0.45)', fontSize: 9, marginTop: 2 }}>
                {lastUpdate ? lastUpdate.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' }) : '—'}
              </div>
            </StatCard>
          </div>

          {rateLimitWarn && (
            <div style={{
              background: 'rgba(245,158,11,0.1)', border: '1px solid rgba(245,158,11,0.4)',
              padding: '8px 12px', borderRadius: 10, marginBottom: 10,
              fontSize: 11, color: '#fbbf24', display: 'flex', alignItems: 'center', gap: 8,
            }}>
              <Icon name="warn" size={14} />
              <span>
                <strong>{totalCalls}</strong> API calls per scan. Binance kan vragen weigeren bij &gt;400.
                Verlaag max paren of zet minder timeframes aan.
              </span>
            </div>
          )}

          {error && (
            <div style={{
              background: 'rgba(239,68,68,0.1)', border: '1px solid rgba(239,68,68,0.4)',
              padding: '10px 14px', borderRadius: 10, marginBottom: 12, fontSize: 12, color: '#fca5a5',
            }}>
              <Icon name="warn" size={14} style={{ display: 'inline', marginRight: 6, verticalAlign: 'middle' }} />
              {error}
            </div>
          )}

          <div className="main-grid" style={{
            display: 'grid',
            gridTemplateColumns: 'minmax(280px, 1fr) minmax(360px, 1.3fr)',
            gap: 14, alignItems: 'flex-start',
          }}>
            {/* FILTERS + DETAIL */}
            <section style={{
              background: 'rgba(15,15,25,0.5)', border: '1px solid rgba(139,92,246,0.15)',
              borderRadius: 14, padding: 14,
            }}>
              {/* TYPES */}
              <div style={{ display: 'flex', gap: 6, flexWrap: 'wrap', marginBottom: 12 }}>
                {Object.entries(SIGNAL_META).map(([k, m]) => (
                  <ChipButton key={k} active={enabledTypes[k]}
                    onClick={() => setEnabledTypes(t => ({ ...t, [k]: !t[k] }))}
                    color={m.color}>
                    {m.label} <span style={{ opacity: 0.8, marginLeft: 3 }}>{counts[k]}</span>
                  </ChipButton>
                ))}
                <div style={{ width: 1, background: 'rgba(255,255,255,0.1)', margin: '0 4px' }} />
                <ChipButton active={direction === 'LONG' || direction === 'BOTH'}
                  onClick={() => setDirection(direction === 'LONG' ? 'BOTH' : 'LONG')}
                  color="#10b981">LONG</ChipButton>
                <ChipButton active={direction === 'SHORT' || direction === 'BOTH'}
                  onClick={() => setDirection(direction === 'SHORT' ? 'BOTH' : 'SHORT')}
                  color="#ef4444">SHORT</ChipButton>
              </div>

              <div style={{ display: 'flex', gap: 6, marginBottom: 10, alignItems: 'center' }}>
                <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', letterSpacing: 0.5 }}>TF:</span>
                {TIMEFRAMES.map(t => (
                  <ChipButton key={t.id} active={timeframes[t.id]}
                    onClick={() => setTimeframes(s => ({ ...s, [t.id]: !s[t.id] }))}>
                    {t.label}
                  </ChipButton>
                ))}
              </div>

              <div style={{ display: 'flex', gap: 6, marginBottom: 10, alignItems: 'center', flexWrap: 'wrap' }}>
                <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', letterSpacing: 0.5 }}>MARKT:</span>
                {MARKETS.map(m => (
                  <ChipButton key={m.id} active={enabledMarkets[m.id]}
                    onClick={() => setEnabledMarkets(s => ({ ...s, [m.id]: !s[m.id] }))}>
                    {m.label}
                  </ChipButton>
                ))}
              </div>

              {/* MAX PAIRS SLIDER */}
              <div style={{ marginBottom: 10, padding: '10px 12px', background: 'rgba(0,0,0,0.25)', borderRadius: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                  <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="bars" size={12} /> MAX PAREN PER MARKT
                  </span>
                  <span style={{ fontSize: 11, color: '#a78bfa', fontWeight: 700 }}>{maxPairs}</span>
                </div>
                <div style={{ display: 'flex', gap: 4 }}>
                  {PAIR_OPTIONS.map(n => (
                    <button key={n} onClick={() => setMaxPairs(n)}
                      style={{
                        flex: 1, padding: '4px 0', fontSize: 10, fontWeight: 600,
                        border: 'none', borderRadius: 4, cursor: 'pointer',
                        background: maxPairs === n ? '#8b5cf6' : 'rgba(255,255,255,0.05)',
                        color: maxPairs === n ? '#fff' : 'rgba(255,255,255,0.6)',
                      }}>{n}</button>
                  ))}
                </div>
              </div>

              {/* MIN RATING */}
              <div style={{ marginBottom: 14, padding: '10px 12px', background: 'rgba(0,0,0,0.25)', borderRadius: 10 }}>
                <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 6 }}>
                  <span style={{ fontSize: 11, color: 'rgba(255,255,255,0.6)', display: 'flex', alignItems: 'center', gap: 4 }}>
                    <Icon name="eye" size={12} /> MIN. RATING
                  </span>
                  <span style={{ fontSize: 11, color: '#a78bfa', fontWeight: 700 }}>{minRating}%</span>
                </div>
                <input type="range" min="0" max="100" value={minRating}
                  onChange={e => setMinRating(parseInt(e.target.value))}
                  style={{ width: '100%' }} />
              </div>

              {selectedSignal ? (
                <SignalDetail signal={selectedSignal} onClose={() => setSelectedSignal(null)} />
              ) : (
                <div style={{
                  padding: 30, textAlign: 'center',
                  border: '1px dashed rgba(139,92,246,0.2)', borderRadius: 12,
                  color: 'rgba(255,255,255,0.4)', fontSize: 13,
                }}>
                  <Icon name="zap" size={32} style={{ opacity: 0.4, marginBottom: 10 }} />
                  <div>Selecteer een signaal rechts om uit te vergroten en te analyseren</div>
                </div>
              )}
            </section>

            {/* SIGNALS LIST */}
            <section style={{
              background: 'rgba(15,15,25,0.5)', border: '1px solid rgba(139,92,246,0.15)',
              borderRadius: 14, padding: 14,
              maxHeight: 'calc(100vh - 200px)', display: 'flex', flexDirection: 'column',
            }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 12 }}>
                <div style={{
                  width: 32, height: 32, borderRadius: 10,
                  background: 'linear-gradient(135deg,#8b5cf6,#6d28d9)',
                  display: 'grid', placeItems: 'center',
                }}><Icon name="zap" size={18} /></div>
                <span style={{ fontWeight: 800, fontSize: 16, letterSpacing: 1 }}>SIGNALEN</span>
                <span style={{ color: '#fbbf24', fontWeight: 700, marginLeft: 'auto', fontFamily: 'ui-monospace, monospace' }}>
                  {filteredSignals.length}<span style={{ color: 'rgba(255,255,255,0.4)' }}>/{signals.length}</span>
                </span>
              </div>

              <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, position: 'relative' }}>
                <span style={{ fontSize: 10, color: 'rgba(255,255,255,0.5)', letterSpacing: 1 }}>SORTEER OP:</span>
                <button onClick={() => setShowSortMenu(v => !v)}
                  style={{
                    flex: 1, display: 'flex', justifyContent: 'space-between',
                    background: 'rgba(139,92,246,0.1)', border: '1px solid rgba(139,92,246,0.3)',
                    color: '#fff', padding: '6px 12px', borderRadius: 8, fontSize: 12, fontWeight: 600,
                    cursor: 'pointer',
                  }}>
                  {SORT_OPTIONS.find(o => o.id === sortBy)?.label}
                  <Icon name="chev_d" size={14} />
                </button>
                {showSortMenu && (
                  <div style={{
                    position: 'absolute', top: '100%', right: 0, marginTop: 4, zIndex: 20,
                    background: 'rgba(15,15,25,0.98)', border: '1px solid rgba(139,92,246,0.3)',
                    borderRadius: 10, padding: 4, minWidth: 160,
                    boxShadow: '0 10px 30px rgba(0,0,0,0.5)',
                  }}>
                    {SORT_OPTIONS.map(o => (
                      <button key={o.id}
                        onClick={() => { setSortBy(o.id); setShowSortMenu(false); }}
                        style={{
                          display: 'block', width: '100%', textAlign: 'left',
                          padding: '8px 12px',
                          background: sortBy === o.id ? 'rgba(139,92,246,0.2)' : 'transparent',
                          color: sortBy === o.id ? '#a78bfa' : '#fff',
                          border: 'none', borderRadius: 6, fontSize: 12, cursor: 'pointer', fontWeight: 500,
                        }}>{o.label}</button>
                    ))}
                  </div>
                )}
              </div>

              <div style={{ position: 'relative', marginBottom: 10 }}>
                <Icon name="search" size={14} style={{ position: 'absolute', left: 10, top: 9, color: 'rgba(255,255,255,0.4)' }} />
                <input value={search} onChange={e => setSearch(e.target.value)}
                  placeholder="Zoek symbool..."
                  style={{
                    width: '100%', padding: '7px 10px 7px 30px',
                    background: 'rgba(0,0,0,0.3)', border: '1px solid rgba(139,92,246,0.2)',
                    borderRadius: 8, color: '#fff', fontSize: 12, outline: 'none',
                  }} />
              </div>

              <div style={{ overflowY: 'auto', flex: 1, display: 'flex', flexDirection: 'column', gap: 8 }}>
                {loading && signals.length === 0 ? (
                  <div style={{ padding: 30, textAlign: 'center', color: 'rgba(255,255,255,0.4)', fontSize: 12 }}>
                    <Icon name="refresh" size={24} className="spin" style={{ marginBottom: 8 }} />
                    <div>Scannen... {progress.done}/{progress.total}</div>
                    <div style={{
                      marginTop: 10, height: 4, background: 'rgba(255,255,255,0.1)',
                      borderRadius: 2, overflow: 'hidden',
                    }}>
                      <div style={{
                        width: (progress.total ? (progress.done/progress.total*100) : 0) + '%',
                        height: '100%', background: 'linear-gradient(90deg,#8b5cf6,#a78bfa)',
                        transition: 'width 0.2s',
                      }} />
                    </div>
                  </div>
                ) : filteredSignals.length === 0 ? (
                  <div style={{ padding: 30, textAlign: 'center', color: 'rgba(255,255,255,0.4)', fontSize: 12 }}>
                    Geen signalen voor deze filter.
                  </div>
                ) : (
                  filteredSignals.slice(0, 100).map(sig => (
                    <SignalCard key={sig.id} sig={sig}
                      selected={selectedSignal?.id === sig.id}
                      onClick={() => setSelectedSignal(sig)} />
                  ))
                )}
              </div>
            </section>
          </div>

          {/* FOOTER */}
          <div style={{
            marginTop: 14, padding: '8px 14px',
            background: 'rgba(15,15,25,0.7)', border: '1px solid rgba(139,92,246,0.15)',
            borderRadius: 12, display: 'flex', alignItems: 'center', gap: 16,
            flexWrap: 'wrap', fontSize: 11,
          }}>
            <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{
                width: 8, height: 8, borderRadius: '50%',
                background: loading ? '#f59e0b' : '#22c55e',
                animation: 'pulse-dot 2s infinite',
              }} />
              <span style={{ color: loading ? '#f59e0b' : '#22c55e', fontWeight: 600 }}>
                {loading ? 'Bezig met scannen' : 'Verbonden'}
              </span>
            </div>
            <div style={{ color: 'rgba(255,255,255,0.5)' }}>Signalen (gefilterd/totaal):</div>
            <div><span style={{ color: '#06b6d4', fontWeight: 700 }}>FVG</span> <span style={{ fontFamily: 'ui-monospace, monospace' }}>{filteredSignals.filter(s=>s.type==='FVG').length} / {counts.FVG}</span></div>
            <div><span style={{ color: '#f59e0b', fontWeight: 700 }}>OB</span>  <span style={{ fontFamily: 'ui-monospace, monospace' }}>{filteredSignals.filter(s=>s.type==='OB').length} / {counts.OB}</span></div>
            <div><span style={{ color: '#a855f7', fontWeight: 700 }}>BOSS</span> <span style={{ fontFamily: 'ui-monospace, monospace' }}>{filteredSignals.filter(s=>s.type==='BOSS').length} / {counts.BOSS}</span></div>
            <div><span style={{ color: '#10b981', fontWeight: 700 }}>FIB</span> <span style={{ fontFamily: 'ui-monospace, monospace' }}>{filteredSignals.filter(s=>s.type==='FIB').length} / {counts.FIB}</span></div>
            <div style={{ marginLeft: 'auto', color: 'rgba(255,255,255,0.5)', fontFamily: 'ui-monospace, monospace' }}>
              {new Date().toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' })}
            </div>
          </div>
        </main>

        {/* RIGHT SIDEBAR */}
        <aside className="desktop-right" style={{
          width: rightCollapsed ? 48 : 200,
          background: 'rgba(8,8,16,0.6)',
          borderLeft: '1px solid rgba(139,92,246,0.1)',
          padding: '14px 8px', display: 'flex', flexDirection: 'column', gap: 6,
          transition: 'width 0.2s ease', flexShrink: 0,
        }}>
          <button onClick={() => setRightCollapsed(v => !v)}
            style={{
              background: 'rgba(139,92,246,0.1)', border: '1px solid rgba(139,92,246,0.2)',
              color: '#a78bfa', borderRadius: 8, padding: 6, cursor: 'pointer',
              display: 'flex', justifyContent: 'center', marginBottom: 8,
            }}>
            <Icon name={rightCollapsed ? 'chev_l' : 'chev_r'} size={14} />
          </button>
          {RIGHT_ICONS.map(it => (
            <SidebarItem key={it.id} icon={it.icon} label={it.label} collapsed={rightCollapsed} />
          ))}
        </aside>
      </div>
    </div>
  );
}

// ============================================================
// MOUNT
// ============================================================
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<TradingBuddyEB />);

// Hide bootloader
setTimeout(() => {
  const boot = document.getElementById('boot');
  if (boot) boot.classList.add('hidden');
}, 100);
</script>
</body>
</html>

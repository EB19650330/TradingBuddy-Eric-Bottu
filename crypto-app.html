<!DOCTYPE html>
<!--
  ============================================================
   FASE 3 (UITGEBREID) + FASE 4 - JE EERSTE ECHTE MINI-APP
  ============================================================

  Dit is je groeiende app. Er zijn nu DRIE schermen, te wisselen
  met de menubalk onderaan - net als in jouw trading-app:

    * MARKTEN   - de lijst munten (tik erop voor de grafiek)
    * PORTFOLIO - je eigen posities met live winst/verlies  (FASE 4)

  Openen: dubbelklikken. Je hebt internet nodig.

  ── WAT IS ER NIEUW? ──────────────────────────────────────
  Tegenover fase 3 zijn er drie verbeteringen + een heel nieuw
  scherm. Alles is gemarkeerd met "NIEUW" in de comments.

  A) MEER TIMEFRAMES op de grafiek (1m / 5m / 15m / 1u / 4u / 1d / 1w),
     net als in je screenshot.

  B) De grafiek haalt nu data van BINANCE (de beurs zelf), want
     die levert wél minuut-grafieken. CoinGecko kon dat niet.
     -> Mooie les: een echte app mengt meerdere databronnen.

  C) MEER MUNTEN in de lijst.

  D) FASE 4: een PORTFOLIO-scherm. Voer in wat je bezit en zie
     live je totale waarde en winst/verlies. Dit is pure rekenlogica.
-->
<html lang="nl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mijn crypto-app</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>

  <style>
    :root {
      --achtergrond:   #0E1525;
      --kaart:         #18213A;
      --rand:          #263250;
      --tekst:         #E8ECF5;
      --tekst-zacht:   #8A93A8;
      --omhoog:        #16C784;
      --omlaag:        #EA3943;
      --accent:        #3B82F6;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background-color: var(--achtergrond);
      color: var(--tekst);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex; align-items: flex-start; justify-content: center;
      padding: 40px 20px;
    }

    .kaart {
      background-color: var(--kaart);
      border: 1px solid var(--rand);
      border-radius: 20px;
      width: 100%; max-width: 460px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.4);
      overflow: hidden;
    }
    .inhoud { padding: 28px; }

    .kop {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 8px;
    }
    .titel { font-size: 20px; font-weight: 700; }
    .live {
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; letter-spacing: 0.5px; color: var(--omhoog);
    }
    .stip {
      width: 8px; height: 8px; border-radius: 50%;
      background-color: var(--omhoog); animation: kloppen 1.6s ease-in-out infinite;
    }
    .subtitel { font-size: 13px; color: var(--tekst-zacht); margin-bottom: 20px; }

    /* ── rijen in de lijst ── */
    .rij {
      display: flex; align-items: center; gap: 14px;
      padding: 14px 6px;
      border-top: 1px solid var(--rand);
      cursor: pointer; border-radius: 10px;
      transition: background-color 0.15s ease;
    }
    .rij:hover { background-color: rgba(255,255,255,0.04); }
    .rij:first-of-type { border-top: none; }

    .logo {
      width: 38px; height: 38px; border-radius: 50%;
      color: #fff; font-weight: 700; font-size: 18px;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .naam-blok { flex: 1; min-width: 0; }
    .naam   { font-weight: 600; font-size: 15px; }
    .ticker { color: var(--tekst-zacht); font-size: 12px; }
    .prijs-blok { text-align: right; }
    .prijs {
      font-family: 'Space Mono', monospace; font-weight: 700; font-size: 16px;
      transition: color 0.6s ease;
    }
    .verandering { font-family: 'Space Mono', monospace; font-size: 13px; margin-top: 2px; }
    .positief { color: var(--omhoog); }
    .negatief { color: var(--omlaag); }

    .voet {
      margin-top: 20px; padding-top: 16px; border-top: 1px solid var(--rand);
      font-size: 12px; color: var(--tekst-zacht);
      display: flex; justify-content: space-between;
    }

    /* ── grafiek-scherm ── */
    #detail { display: none; }
    .terug {
      background: none; border: none; color: var(--tekst-zacht);
      font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 500;
      cursor: pointer; padding: 4px 0; margin-bottom: 16px;
    }
    .terug:hover { color: var(--tekst); }
    .detail-kop { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
    .detail-prijs { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 30px; margin-bottom: 2px; }
    .detail-ver { font-family: 'Space Mono', monospace; font-size: 14px; }
    .grafiek-vak { height: 220px; margin: 16px 0; }

    /* NIEUW (A): de timeframe-knoppen. Een hele rij past niet altijd
       op een telefoon, dus we maken hem zijwaarts scrollbaar. */
    .tijdvakken {
      display: flex; gap: 6px; margin-top: 8px;
      overflow-x: auto; padding-bottom: 4px;
    }
    .tijdknop {
      flex: 0 0 auto; padding: 7px 12px;
      background-color: var(--achtergrond);
      border: 1px solid var(--rand); border-radius: 8px;
      color: var(--tekst-zacht);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.15s ease;
    }
    .tijdknop:hover { color: var(--tekst); }
    .tijdknop.actief {
      background-color: var(--rand); color: var(--tekst); border-color: var(--tekst-zacht);
    }

    /* ── FASE 4: portfolio-scherm ── */
    #portfolioscherm { display: none; }

    /* De totaal-balans bovenaan het portfolio */
    .balans-vak { margin-bottom: 20px; }
    .balans-label { font-size: 13px; color: var(--tekst-zacht); }
    .balans-bedrag { font-family: 'Space Mono', monospace; font-size: 34px; font-weight: 700; margin: 4px 0; }
    .balans-pnl { font-family: 'Space Mono', monospace; font-size: 14px; }

    /* Het invoer-blokje om een positie toe te voegen */
    .invoer {
      background-color: var(--achtergrond);
      border: 1px solid var(--rand); border-radius: 12px;
      padding: 14px; margin-bottom: 20px;
    }
    .invoer-titel { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--tekst-zacht); }
    .invoer select, .invoer input {
      width: 100%; padding: 9px 10px; margin-bottom: 8px;
      background-color: var(--kaart);
      border: 1px solid var(--rand); border-radius: 8px;
      color: var(--tekst); font-family: 'Inter', sans-serif; font-size: 14px;
    }
    .toevoeg-knop {
      width: 100%; padding: 10px;
      background-color: var(--accent); border: none; border-radius: 8px;
      color: #fff; font-family: 'Inter', sans-serif; font-size: 14px; font-weight: 600;
      cursor: pointer;
    }
    .toevoeg-knop:hover { filter: brightness(1.1); }

    .leeg {
      text-align: center; color: var(--tekst-zacht);
      padding: 24px 0; font-size: 14px;
    }

    /* Een positie-rij in het portfolio */
    .positie {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-top: 1px solid var(--rand);
    }
    .positie:first-of-type { border-top: none; }
    .positie-info { flex: 1; min-width: 0; }
    .positie-naam { font-weight: 600; font-size: 14px; }
    .positie-detail { font-size: 12px; color: var(--tekst-zacht); margin-top: 1px; }
    .positie-waarde { text-align: right; }
    .positie-bedrag { font-family: 'Space Mono', monospace; font-weight: 700; font-size: 14px; }
    .positie-pnl { font-family: 'Space Mono', monospace; font-size: 12px; margin-top: 1px; }
    .verwijder {
      background: none; border: none; color: var(--tekst-zacht);
      font-size: 18px; cursor: pointer; padding: 0 0 0 6px; line-height: 1;
    }
    .verwijder:hover { color: var(--omlaag); }

    /* ── de menubalk onderaan ── */
    .menubalk {
      display: flex; border-top: 1px solid var(--rand);
      background-color: rgba(0,0,0,0.15);
    }
    .menuknop {
      flex: 1; padding: 14px 0;
      background: none; border: none; cursor: pointer;
      color: var(--tekst-zacht);
      font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600;
    }
    .menuknop.actief { color: var(--tekst); }

    @keyframes kloppen {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.4; transform: scale(0.8); }
    }
    @media (prefers-reduced-motion: reduce) { .stip { animation: none; } }
  </style>
</head>

<body>

  <div class="kaart">
    <div class="inhoud">

      <!-- ===== SCHERM 1: MARKTEN ===== -->
      <div id="lijstscherm">
        <div class="kop">
          <div class="titel">Markten</div>
          <div class="live"><span class="stip"></span>LIVE</div>
        </div>
        <div class="subtitel">Tik op een munt voor de grafiek</div>
        <div id="lijst"></div>
        <div class="voet">
          <span>Bron: CoinGecko</span>
          <span id="bijgewerkt">&nbsp;</span>
        </div>
      </div>

      <!-- ===== SCHERM 2: GRAFIEK ===== -->
      <div id="detail">
        <button class="terug" id="terugknop">&larr; Terug naar markten</button>
        <div class="detail-kop">
          <div class="logo" id="detail-logo">B</div>
          <div>
            <div class="naam" id="detail-naam">Bitcoin</div>
            <div class="ticker" id="detail-ticker">BTC / USDT</div>
          </div>
        </div>
        <div class="detail-prijs" id="detail-prijs">...</div>
        <div class="detail-ver" id="detail-ver">&nbsp;</div>
        <div class="grafiek-vak"><canvas id="grafiek"></canvas></div>

        <!-- NIEUW (A): meer timeframes. data-interval is de code die
             Binance verwacht; data-limit is hoeveel punten we tonen. -->
        <div class="tijdvakken">
          <button class="tijdknop actief" data-interval="1m"  data-limit="120">1m</button>
          <button class="tijdknop"        data-interval="5m"  data-limit="120">5m</button>
          <button class="tijdknop"        data-interval="15m" data-limit="96">15m</button>
          <button class="tijdknop"        data-interval="1h"  data-limit="120">1u</button>
          <button class="tijdknop"        data-interval="4h"  data-limit="120">4u</button>
          <button class="tijdknop"        data-interval="1d"  data-limit="120">1d</button>
          <button class="tijdknop"        data-interval="1w"  data-limit="104">1w</button>
        </div>
      </div>

      <!-- ===== SCHERM 3: PORTFOLIO (FASE 4) ===== -->
      <div id="portfolioscherm">
        <div class="kop">
          <div class="titel">Portfolio</div>
        </div>

        <div class="balans-vak">
          <div class="balans-label">Totale waarde</div>
          <div class="balans-bedrag" id="totaal-waarde">$0.00</div>
          <div class="balans-pnl" id="totaal-pnl">&nbsp;</div>
        </div>

        <!-- Invoer: kies munt, aantal en aankoopprijs -->
        <div class="invoer">
          <div class="invoer-titel">Positie toevoegen</div>
          <select id="invoer-munt"></select>
          <input id="invoer-aantal" type="number" placeholder="Aantal (bijv. 0.5)" step="any" min="0">
          <input id="invoer-prijs" type="number" placeholder="Aankoopprijs per stuk in $" step="any" min="0">
          <button class="toevoeg-knop" id="toevoeg-knop">Toevoegen</button>
        </div>

        <!-- Hier komen de posities, of een 'leeg' bericht -->
        <div id="posities"></div>
      </div>

    </div>

    <!-- ── menubalk onderaan ── -->
    <div class="menubalk">
      <button class="menuknop actief" id="nav-markten">Markten</button>
      <button class="menuknop" id="nav-portfolio">Portfolio</button>
    </div>
  </div>

  <script>

    // ========================================================
    //  NIEUW (C): meer munten. Elke munt heeft nu OOK een 'symbol'
    //  erbij: het Binance-handelspaar (zoals BTCUSDT), nodig voor
    //  de grafiek. 'id' is voor CoinGecko, 'symbol' voor Binance.
    // ========================================================
    const MUNTEN = [
      { id: "bitcoin",      naam: "Bitcoin",   ticker: "BTC",  symbol: "BTCUSDT",  letter: "B", kleur: "#F7931A" },
      { id: "ethereum",     naam: "Ethereum",  ticker: "ETH",  symbol: "ETHUSDT",  letter: "E", kleur: "#627EEA" },
      { id: "binancecoin",  naam: "BNB",       ticker: "BNB",  symbol: "BNBUSDT",  letter: "B", kleur: "#F3BA2F" },
      { id: "solana",       naam: "Solana",    ticker: "SOL",  symbol: "SOLUSDT",  letter: "S", kleur: "#14B88A" },
      { id: "ripple",       naam: "XRP",       ticker: "XRP",  symbol: "XRPUSDT",  letter: "X", kleur: "#23A0D8" },
      { id: "cardano",      naam: "Cardano",   ticker: "ADA",  symbol: "ADAUSDT",  letter: "A", kleur: "#3468D1" },
      { id: "dogecoin",     naam: "Dogecoin",  ticker: "DOGE", symbol: "DOGEUSDT", letter: "D", kleur: "#C2A633" },
      { id: "avalanche-2",  naam: "Avalanche", ticker: "AVAX", symbol: "AVAXUSDT", letter: "A", kleur: "#E84142" },
      { id: "chainlink",    naam: "Chainlink", ticker: "LINK", symbol: "LINKUSDT", letter: "L", kleur: "#2A5ADA" },
      { id: "polkadot",     naam: "Polkadot",  ticker: "DOT",  symbol: "DOTUSDT",  letter: "D", kleur: "#E6007A" },
      { id: "litecoin",     naam: "Litecoin",  ticker: "LTC",  symbol: "LTCUSDT",  letter: "L", kleur: "#345D9D" },
      { id: "tron",         naam: "TRON",      ticker: "TRX",  symbol: "TRXUSDT",  letter: "T", kleur: "#EF0027" },
    ];

    // Snel een munt kunnen opzoeken op zijn id (handig voor het portfolio).
    const muntPerId = {};
    MUNTEN.forEach(function (m) { muntPerId[m.id] = m; });

    const lijstEl      = document.getElementById("lijst");
    const bijgewerktEl = document.getElementById("bijgewerkt");
    const vorigePrijzen = {};

    // NIEUW (D): hierin bewaren we de laatst bekende prijs per munt,
    // zodat het portfolio er altijd bij kan om waardes te berekenen.
    const laatstePrijzen = {};

    const lijstscherm    = document.getElementById("lijstscherm");
    const detail         = document.getElementById("detail");
    const portfolioscherm = document.getElementById("portfolioscherm");

    let huidigeMunt = null;
    let huidigInterval = "1m";
    let huidigLimit = 120;
    let grafiek = null;

    // ========================================================
    //  MARKTEN-LIJST
    // ========================================================
    function bouwRijen() {
      MUNTEN.forEach(function (munt) {
        const rij = document.createElement("div");
        rij.className = "rij";
        rij.innerHTML =
          '<div class="logo" style="background-color:' + munt.kleur + '">' + munt.letter + '</div>' +
          '<div class="naam-blok">' +
            '<div class="naam">' + munt.naam + '</div>' +
            '<div class="ticker">' + munt.ticker + ' / USDT</div>' +
          '</div>' +
          '<div class="prijs-blok">' +
            '<div class="prijs" id="prijs-' + munt.id + '">...</div>' +
            '<div class="verandering" id="ver-' + munt.id + '">&nbsp;</div>' +
          '</div>';
        rij.addEventListener("click", function () { openGrafiek(munt); });
        lijstEl.appendChild(rij);
      });
    }

    async function haalKoersenOp() {
      try {
        const ids = MUNTEN.map(function (m) { return m.id; }).join(",");
        const adres = "https://api.coingecko.com/api/v3/simple/price"
                    + "?ids=" + ids + "&vs_currencies=usd&include_24hr_change=true";
        const antwoord = await fetch(adres);
        const gegevens = await antwoord.json();

        MUNTEN.forEach(function (munt) {
          const data = gegevens[munt.id];
          if (!data) return;
          const prijs = data.usd;
          laatstePrijzen[munt.id] = prijs; // bewaren voor het portfolio

          const prijsEl = document.getElementById("prijs-" + munt.id);
          const verEl   = document.getElementById("ver-" + munt.id);
          prijsEl.textContent = formatPrijs(prijs);

          const vorige = vorigePrijzen[munt.id];
          if (vorige !== undefined) {
            if (prijs > vorige) flits(prijsEl, "var(--omhoog)");
            else if (prijs < vorige) flits(prijsEl, "var(--omlaag)");
          }
          vorigePrijzen[munt.id] = prijs;

          const v = data.usd_24h_change;
          const teken = v >= 0 ? "+" : "";
          verEl.textContent = teken + v.toFixed(2) + "%";
          verEl.className = "verandering " + (v >= 0 ? "positief" : "negatief");
        });

        const nu = new Date();
        bijgewerktEl.textContent = "Bijgewerkt om " + nu.toLocaleTimeString("nl-NL");

        // Staat het portfolio open? Werk dan ook de waardes daar bij.
        rerenderPortfolio();
      } catch (fout) {
        bijgewerktEl.textContent = "Even niet bereikbaar...";
        console.log("Fout bij koersen:", fout);
      }
    }

    // ========================================================
    //  GRAFIEK (nu met Binance-data en meer timeframes)
    // ========================================================
    function openGrafiek(munt) {
      huidigeMunt = munt;
      const logoEl = document.getElementById("detail-logo");
      logoEl.textContent = munt.letter;
      logoEl.style.backgroundColor = munt.kleur;
      document.getElementById("detail-naam").textContent = munt.naam;
      document.getElementById("detail-ticker").textContent = munt.ticker + " / USDT";
      toonScherm("detail");
      tekenGrafiek();
    }

    document.getElementById("terugknop").addEventListener("click", function () {
      toonScherm("markten");
    });

    // Timeframe-knoppen koppelen.
    document.querySelectorAll(".tijdknop").forEach(function (knop) {
      knop.addEventListener("click", function () {
        huidigInterval = knop.dataset.interval;
        huidigLimit = Number(knop.dataset.limit);
        document.querySelectorAll(".tijdknop").forEach(function (k) {
          k.classList.toggle("actief", k === knop);
        });
        tekenGrafiek();
      });
    });

    async function tekenGrafiek() {
      const munt = huidigeMunt;
      const prijsEl = document.getElementById("detail-prijs");
      const verEl   = document.getElementById("detail-ver");
      prijsEl.textContent = "laden...";
      verEl.textContent = "";

      try {
        // NIEUW (B): Binance klines. Geeft 'candles' terug; wij gebruiken
        // de slotprijs (index 4) van elke candle voor een vloeiende lijn.
        const adres = "https://data-api.binance.vision/api/v3/klines"
                    + "?symbol=" + munt.symbol
                    + "&interval=" + huidigInterval
                    + "&limit=" + huidigLimit;
        const antwoord = await fetch(adres);
        const candles = await antwoord.json();

        // Elke candle is een rijtje: [openTijd, open, hoog, laag, slot, ...]
        const tijden  = candles.map(function (c) { return formatTijd(c[0], huidigInterval); });
        const prijzen = candles.map(function (c) { return parseFloat(c[4]); });

        const eerste = prijzen[0];
        const laatste = prijzen[prijzen.length - 1];
        const pct = ((laatste - eerste) / eerste) * 100;
        const steeg = laatste >= eerste;
        const lijnkleur = steeg ? "#16C784" : "#EA3943";

        prijsEl.textContent = formatPrijs(laatste);
        const teken = pct >= 0 ? "+" : "";
        verEl.textContent = teken + pct.toFixed(2) + "% over deze periode";
        verEl.className = "detail-ver " + (steeg ? "positief" : "negatief");

        if (grafiek) grafiek.destroy();
        grafiek = new Chart(document.getElementById("grafiek"), {
          type: "line",
          data: {
            labels: tijden,
            datasets: [{
              data: prijzen,
              borderColor: lijnkleur, borderWidth: 2, fill: true,
              backgroundColor: steeg ? "rgba(22,199,132,0.08)" : "rgba(234,57,67,0.08)",
              pointRadius: 0, tension: 0.3
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { color: "#8A93A8", maxTicksLimit: 5, font: { size: 10 } }, grid: { display: false } },
              y: { ticks: { color: "#8A93A8", font: { size: 10 } }, grid: { color: "rgba(255,255,255,0.05)" } }
            }
          }
        });
      } catch (fout) {
        prijsEl.textContent = "Grafiek niet beschikbaar";
        console.log("Fout bij grafiek:", fout);
      }
    }

    // ========================================================
    //  NIEUW (D): FASE 4 - HET PORTFOLIO
    //  Dit is bijna helemaal rekenwerk, geen nieuwe externe dingen.
    // ========================================================

    // De lijst met posities die jij toevoegt. Elk item ziet er zo uit:
    //   { muntId: "bitcoin", aantal: 0.5, aankoopPrijs: 60000 }
    // (Let op: deze lijst leeft in het geheugen. Ververs je de pagina,
    //  dan is hij leeg. Onderaan leg ik uit hoe je hem kunt bewaren.)
    let portefeuille = [];

    // Vul de keuzelijst (dropdown) met alle munten.
    function vulMuntKeuze() {
      const select = document.getElementById("invoer-munt");
      MUNTEN.forEach(function (m) {
        const optie = document.createElement("option");
        optie.value = m.id;
        optie.textContent = m.naam + " (" + m.ticker + ")";
        select.appendChild(optie);
      });
    }

    // Een positie toevoegen wanneer je op 'Toevoegen' klikt.
    document.getElementById("toevoeg-knop").addEventListener("click", function () {
      const muntId = document.getElementById("invoer-munt").value;
      const aantal = parseFloat(document.getElementById("invoer-aantal").value);
      const prijs  = parseFloat(document.getElementById("invoer-prijs").value);

      // Even controleren of de invoer klopt (echte getallen, groter dan 0).
      if (!(aantal > 0) || !(prijs > 0)) {
        alert("Vul een geldig aantal en een geldige aankoopprijs in.");
        return;
      }

      portefeuille.push({ muntId: muntId, aantal: aantal, aankoopPrijs: prijs });

      // Invoervelden leegmaken voor de volgende keer.
      document.getElementById("invoer-aantal").value = "";
      document.getElementById("invoer-prijs").value = "";

      rerenderPortfolio();
    });

    // Teken het hele portfolio opnieuw: alle posities + de totalen.
    // Dit draait bij elke prijs-update, zodat de waardes live meelopen.
    function rerenderPortfolio() {
      const positiesEl = document.getElementById("posities");
      const totaalWaardeEl = document.getElementById("totaal-waarde");
      const totaalPnlEl = document.getElementById("totaal-pnl");

      // Geen posities? Toon een vriendelijk leeg-bericht.
      if (portefeuille.length === 0) {
        positiesEl.innerHTML = '<div class="leeg">Je hebt nog geen posities.<br>Voeg er hierboven een toe.</div>';
        totaalWaardeEl.textContent = "$0.00";
        totaalPnlEl.textContent = "\u00A0";
        totaalPnlEl.className = "balans-pnl";
        return;
      }

      let totaleWaarde = 0;  // wat alles nu waard is
      let totaleKosten = 0;  // wat je er ooit voor betaald hebt
      let html = "";

      // Loop door elke positie en reken hem door.
      portefeuille.forEach(function (positie, index) {
        const munt = muntPerId[positie.muntId];
        const huidigePrijs = laatstePrijzen[positie.muntId]; // kan nog ontbreken bij eerste laden

        // Waarde nu = aantal * huidige prijs.  Kosten = aantal * aankoopprijs.
        const kosten = positie.aantal * positie.aankoopPrijs;
        const waarde = (huidigePrijs !== undefined)
          ? positie.aantal * huidigePrijs
          : kosten; // nog geen live prijs? toon dan even de kostprijs

        const winst = waarde - kosten;             // winst of verlies in $
        const winstPct = (winst / kosten) * 100;   // ...en in procenten

        totaleWaarde += waarde;
        totaleKosten += kosten;

        const klasse = winst >= 0 ? "positief" : "negatief";
        const teken = winst >= 0 ? "+" : "";

        html +=
          '<div class="positie">' +
            '<div class="logo" style="background-color:' + munt.kleur + ';width:32px;height:32px;font-size:15px">' + munt.letter + '</div>' +
            '<div class="positie-info">' +
              '<div class="positie-naam">' + munt.naam + '</div>' +
              '<div class="positie-detail">' + positie.aantal + ' ' + munt.ticker +
                ' @ ' + formatPrijs(positie.aankoopPrijs) + '</div>' +
            '</div>' +
            '<div class="positie-waarde">' +
              '<div class="positie-bedrag">' + formatGeld(waarde) + '</div>' +
              '<div class="positie-pnl ' + klasse + '">' + teken + formatGeld(winst) +
                ' (' + teken + winstPct.toFixed(1) + '%)</div>' +
            '</div>' +
            // Het kruisje om deze positie te verwijderen.
            '<button class="verwijder" data-index="' + index + '">&times;</button>' +
          '</div>';
      });

      positiesEl.innerHTML = html;

      // Koppel de verwijder-knopjes.
      positiesEl.querySelectorAll(".verwijder").forEach(function (knop) {
        knop.addEventListener("click", function () {
          const i = Number(knop.dataset.index);
          portefeuille.splice(i, 1); // haal deze positie uit de lijst
          rerenderPortfolio();
        });
      });

      // De totalen onderaan/bovenaan berekenen.
      const totaleWinst = totaleWaarde - totaleKosten;
      const totaalPct = totaleKosten > 0 ? (totaleWinst / totaleKosten) * 100 : 0;
      totaalWaardeEl.textContent = formatGeld(totaleWaarde);
      const t = totaleWinst >= 0 ? "+" : "";
      totaalPnlEl.textContent = t + formatGeld(totaleWinst) + " (" + t + totaalPct.toFixed(2) + "%)";
      totaalPnlEl.className = "balans-pnl " + (totaleWinst >= 0 ? "positief" : "negatief");
    }

    // ========================================================
    //  NAVIGATIE: tussen de schermen wisselen
    // ========================================================
    function toonScherm(naam) {
      // Verberg alles, toon dan het gevraagde scherm.
      lijstscherm.style.display = "none";
      detail.style.display = "none";
      portfolioscherm.style.display = "none";

      if (naam === "markten")   lijstscherm.style.display = "block";
      if (naam === "detail")    detail.style.display = "block";
      if (naam === "portfolio") { portfolioscherm.style.display = "block"; rerenderPortfolio(); }

      // Markeer de juiste knop in de menubalk.
      document.getElementById("nav-markten").classList.toggle("actief", naam !== "portfolio");
      document.getElementById("nav-portfolio").classList.toggle("actief", naam === "portfolio");
    }

    document.getElementById("nav-markten").addEventListener("click", function () { toonScherm("markten"); });
    document.getElementById("nav-portfolio").addEventListener("click", function () { toonScherm("portfolio"); });

    // ========================================================
    //  HULPJES
    // ========================================================
    function formatPrijs(p) {
      if (p >= 1000) return "$" + p.toLocaleString("en-US", { maximumFractionDigits: 0 });
      if (p >= 1)    return "$" + p.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      return "$" + p.toFixed(4);
    }
    // Voor het portfolio willen we altijd 2 decimalen (bedragen in $).
    function formatGeld(bedrag) {
      return "$" + bedrag.toLocaleString("en-US", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    function formatTijd(tijdstempel, interval) {
      const d = new Date(tijdstempel);
      // Bij minuten/uren tonen we de klok; bij dagen/weken de datum.
      if (interval.endsWith("m") || interval.endsWith("h")) {
        return d.toLocaleTimeString("nl-NL", { hour: "2-digit", minute: "2-digit" });
      }
      return d.toLocaleDateString("nl-NL", { day: "numeric", month: "short" });
    }
    function flits(element, kleur) {
      element.style.color = kleur;
      setTimeout(function () { element.style.color = "var(--tekst)"; }, 600);
    }

    // ========================================================
    //  AAN DE SLAG
    // ========================================================
    bouwRijen();
    vulMuntKeuze();
    haalKoersenOp();
    setInterval(haalKoersenOp, 10000);

  </script>
</body>
